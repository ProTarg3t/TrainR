// ================================================================
// DB LAYER
// Swap dbOp / dbGetAll for fetch() calls when going public
// ================================================================
const DB_NAME = 'trainr_v1';

const initDB = () => new Promise((resolve, reject) => {
  const req = indexedDB.open(DB_NAME, 1);
  req.onupgradeneeded = e => {
    const db = e.target.result;
    if (!db.objectStoreNames.contains('routines')) db.createObjectStore('routines', { keyPath: 'id' });
    if (!db.objectStoreNames.contains('sessions')) db.createObjectStore('sessions', { keyPath: 'id' });
  };
  req.onsuccess = e => resolve(e.target.result);
  req.onerror = e => reject(e.target.error);
});

const dbOp = (db, store, mode, fn) => new Promise((resolve, reject) => {
  const tx = db.transaction(store, mode);
  const req = fn(tx.objectStore(store));
  req.onsuccess = e => resolve(e.target.result);
  req.onerror = e => reject(e.target.error);
});

const dbGetAll = (db, store) => new Promise((resolve, reject) => {
  const tx = db.transaction(store, 'readonly');
  const req = tx.objectStore(store).getAll();
  req.onsuccess = e => resolve(e.target.result || []);
  req.onerror = e => reject(e.target.error);
});

function buildHighlighted(ex) {
  const h = {};
  (ex.muscles?.secondary || []).forEach(m => { h[m] = 'secondary'; });
  (ex.muscles?.primary   || []).forEach(m => { h[m] = 'primary';   });
  return h;
}
function detectViews(h) {
  let f = false, b = false;
  for (const m of Object.keys(h)) {
    const v = MUSCLE_CONFIG[m]?.view;
    if (v === 'front' || v === 'both') f = true;
    if (v === 'back'  || v === 'both') b = true;
  }
  if (f && b) return 'both';
  return b ? 'back' : 'front';
}
function zoneStyle(name, h) {
  const lvl = h[name] || 'none';
  return { fill: MUSCLE_COLORS[lvl].fill, stroke: MUSCLE_COLORS[lvl].stroke, strokeWidth: 0.6 };
}
function mergeRoutineMuscles(exercises) {
  const prim = new Set(), sec = new Set();
  exercises.forEach(ex => {
    (ex.muscles?.primary   || []).forEach(m => prim.add(m));
    (ex.muscles?.secondary || []).forEach(m => sec.add(m));
  });
  prim.forEach(m => sec.delete(m));
  return { name: 'Routine', muscles: { primary: [...prim], secondary: [...sec] } };
}
function pickStroke(level) {
  if (level === 'primary')   return '#7a7a7a';
  if (level === 'secondary') return '#525252';
  return '#262626';
}

function BodyDiagram({ exercise, height = 260 }) {
  const h     = React.useMemo(() => buildHighlighted(exercise), [exercise]);
  const views = detectViews(h);
  const both  = views === 'both';
  const figW  = height * (100 / 244);
  const lbl   = { textAlign: 'center', fontSize: 9, letterSpacing: 2, color: '#484848', marginBottom: 4 };
  return (
    <div style={{ display: 'flex', gap: 14, justifyContent: 'center', alignItems: 'flex-start' }}>
      {(views === 'front' || both) && (
        <div style={{ width: figW, flexShrink: 0 }}>
          <div style={lbl}>VOOR</div>
          <div style={{ height }}><FrontBody h={h}/></div>
        </div>
      )}
      {(views === 'back' || both) && (
        <div style={{ width: figW, flexShrink: 0 }}>
          <div style={lbl}>ACHTER</div>
          <div style={{ height }}><BackBody h={h}/></div>
        </div>
      )}
    </div>
  );
}

function MuscleTags({ exercise }) {
  const { primary = [], secondary = [] } = exercise.muscles || {};
  const tag = (m, level) => (
    <span key={m} style={{
      display: 'inline-block', padding: '2px 7px', borderRadius: 2,
      background: level === 'primary' ? '#cacaca' : '#242424',
      color:      level === 'primary' ? '#080808' : '#707070',
      fontSize: 10, marginRight: 5, marginBottom: 4,
    }}>{MUSCLE_CONFIG[m]?.label || m}</span>
  );
  return (
    <div style={{ marginTop: 12, paddingTop: 12, borderTop: '1px solid #212121' }}>
      {primary.length > 0 && (
        <div style={{ marginBottom: 8 }}>
          <div style={{ fontSize: 9, color: '#484848', letterSpacing: 1.5, marginBottom: 5 }}>PRIMAIR</div>
          <div>{primary.map(m => tag(m, 'primary'))}</div>
        </div>
      )}
      {secondary.length > 0 && (
        <div>
          <div style={{ fontSize: 9, color: '#484848', letterSpacing: 1.5, marginBottom: 5 }}>SECUNDAIR</div>
          <div>{secondary.map(m => tag(m, 'secondary'))}</div>
        </div>
      )}
    </div>
  );
}

// ================================================================
// AUDIO
// ================================================================
function beep(ctx, freq = 880) {
  if (!ctx) return;
  try {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    o.start(); o.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

// ================================================================
// TIMER HELPERS
// ================================================================
function buildSequence(exercises, levelIdx) {
  const seq = [];
  const midIdx = Math.floor(exercises.length / 2) - 1;
  exercises.forEach((ex, i) => {
    seq.push({ ...ex, duration: ex.times[levelIdx], isRest: false });
    if (i < exercises.length - 1) {
      const isMid = i === midIdx;
      seq.push({
        id: `rest-${i}`, name: isMid ? 'Halverwege · rust' : 'Rust',
        desc: isMid ? 'Goed bezig!' : `Volgende: ${exercises[i+1].name}`,
        duration: isMid ? 10 : 5, isRest: true, isMid,
      });
    }
  });
  return seq;
}

function calcStreak(sessions) {
  if (!sessions.length) return 0;
  const days = new Set(sessions.map(s => new Date(s.completedAt).toDateString()));
  let count = 0;
  const d = new Date();
  // check from today
  while (days.has(d.toDateString())) { count++; d.setDate(d.getDate() - 1); }
  // if today not done, check from yesterday
  if (count === 0) {
    d.setDate(d.getDate() - 1);
    while (days.has(d.toDateString())) { count++; d.setDate(d.getDate() - 1); }
  }
  return count;
}

const C = {

  accent: '#ff4d00', text: '#e8e8e8', muted: '#909090', dim: '#333',
  font: "'Courier New', Courier, monospace",
};

const Btn = ({ onClick, children, bg = C.accent, color, style = {}, disabled: dis = false }) => {
  const isSurface = bg === C.surface || bg === C.bg;
  const borderColor = isSurface ? C.border : bg;
  const textColor = color || (isSurface ? C.muted : bg);
  return (
    <button onClick={onClick} disabled={dis} style={{
      background: 'transparent', color: textColor,
      border: `1px solid ${borderColor}`,
      padding: '12px 22px', fontSize: 12,
      letterSpacing: '0.18em', cursor: dis ? 'default' : 'pointer',
      fontFamily: C.font, textTransform: 'uppercase', opacity: dis ? 0.3 : 1, ...style,
    }}>{children}</button>
  );
};

const Label = ({ children }) => (
  <div style={{ color: C.muted, fontSize: 11, letterSpacing: '0.22em', marginBottom: 8 }}>{children}</div>
);

function HomeScreen({ dbRef, onNavigate }) {
  const [sessions, setSessions] = useState([]);
  const [routines, setRoutines] = useState([]);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    if (!dbRef.current) return;
    Promise.all([dbGetAll(dbRef.current, 'sessions'), dbGetAll(dbRef.current, 'routines')])
      .then(([s, r]) => {
        setSessions(s.sort((a, b) => b.completedAt - a.completedAt));
        setRoutines(r);
        setReady(true);
      });
  }, []);

  const streak = useMemo(() => calcStreak(sessions), [sessions]);
  const lastSession = sessions[0];
  const today = new Date();
  const todayDone = sessions.some(s => new Date(s.completedAt).toDateString() === today.toDateString());
  const hours = today.getHours();
  const greeting = hours < 12 ? 'GOEDEMORGEN' : hours < 18 ? 'GOEDEMIDDAG' : 'GOEDENAVOND';

  const last7 = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - (6 - i));
    return {
      label: ['Zo','Ma','Di','Wo','Do','Vr','Za'][d.getDay()],
      done: sessions.some(s => new Date(s.completedAt).toDateString() === d.toDateString()),
      isToday: d.toDateString() === today.toDateString(),
    };
  });

  if (!ready) return <Loader />;

  return (
    <div style={{ padding: '36px 20px 100px' }}>
      <div style={{ color: C.muted, fontSize: 11, letterSpacing: '0.25em', marginBottom: 4 }}>{greeting}</div>
      <div style={{ color: C.text, fontSize: 22, letterSpacing: '0.03em', marginBottom: 28 }}>
        {todayDone ? 'Goed gedaan vandaag.' : 'Klaar om te trainen?'}
      </div>

      {/* Week */}
      <div style={{ display: 'flex', gap: 6, marginBottom: 24 }}>
        {last7.map((d, i) => (
          <div key={i} style={{ flex: 1, textAlign: 'center' }}>
            <div style={{ width: '100%', aspectRatio: '1', background: d.done ? C.accent : C.surface, border: `1px solid ${d.isToday ? C.accent : C.border}`, opacity: d.done ? 1 : 0.4, marginBottom: 4 }} />
            <div style={{ fontSize: 11, color: d.isToday ? C.accent : C.muted, letterSpacing: '0.05em' }}>{d.label}</div>
          </div>
        ))}
      </div>

      {/* Streak */}
      <div style={{ border: `1px solid ${C.border}`, padding: '16px 20px', marginBottom: 16, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div>
          <Label>STREAK</Label>
          <div style={{ color: streak > 0 ? C.accent : C.muted, fontSize: 36, fontWeight: 'bold', lineHeight: 1 }}>{streak}</div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{ color: C.muted, fontSize: 12 }}>{streak === 1 ? 'DAG' : 'DAGEN'} OP RIJ</div>
          {streak >= 7 && <div style={{ color: C.accent, fontSize: 11, marginTop: 4, letterSpacing: '0.1em' }}>🔥 WEEK STREAK</div>}
        </div>
      </div>

      {/* Last session */}
      {lastSession && (
        <div style={{ border: `1px solid ${C.border}`, padding: '14px 20px', marginBottom: 24 }}>
          <Label>LAATSTE SESSIE</Label>
          <div style={{ color: C.text, fontSize: 14, marginBottom: 4 }}>{lastSession.routineName}</div>
          <div style={{ color: C.muted, fontSize: 11, display: 'flex', gap: 16 }}>
            <span>{LEVELS[lastSession.levelIdx]}</span>
            <span>{Math.floor(lastSession.duration/60)}:{String(lastSession.duration%60).padStart(2,'0')} min</span>
            <span>{new Date(lastSession.completedAt).toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' })}</span>
          </div>
        </div>
      )}

      {/* Routines quick start */}
      {routines.length > 0 ? (
        <div>
          <Label>SNEL STARTEN</Label>
          {routines.slice(0, 4).map(r => (
            <div key={r.id} onClick={() => onNavigate('timer', { routineId: r.id })}
              style={{ border: `1px solid ${C.border}`, padding: '14px 20px', marginBottom: 6, cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <div style={{ width: 5, height: 5, background: CAT_COLORS[r.category] || C.accent, borderRadius: '50%' }} />
                  <div style={{ color: C.text, fontSize: 13 }}>{r.name}</div>
                </div>
                <div style={{ color: C.muted, fontSize: 12, marginTop: 3, paddingLeft: 13 }}>{r.exercises.length} oefeningen</div>
              </div>
              <div style={{ color: C.accent, fontSize: 20 }}>▶</div>
            </div>
          ))}
        </div>
      ) : (
        <div style={{ textAlign: 'center', padding: '40px 0' }}>
          <div style={{ color: C.muted, fontSize: 12, letterSpacing: '0.1em', marginBottom: 20 }}>Nog geen routines.</div>
          <Btn onClick={() => onNavigate('builder', {})}>MAAK EERSTE ROUTINE</Btn>
        </div>
      )}
    </div>
  );
}

        <div key={r.id} onClick={() => onNavigate('timer', { routineId: r.id })}
          style={{ border: `1px solid ${C.border}`, marginBottom: 8, cursor: 'pointer' }}>
          <div style={{ padding: '14px 18px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ flex: 1 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                <div style={{ width: 6, height: 6, background: CAT_COLORS[r.category] || C.accent, borderRadius: '50%' }} />
                <div style={{ color: C.text, fontSize: 14 }}>{r.name}</div>
              </div>
              <div style={{ color: C.muted, fontSize: 12, paddingLeft: 14 }}>{r.category} · {r.exercises.length} oefeningen</div>
            </div>
            <div style={{ display: 'flex', gap: 14, alignItems: 'center' }}>
              <button onClick={e => { e.stopPropagation(); onNavigate('builder', { routineId: r.id }); }}
                style={{ background: 'none', border: 'none', color: C.muted, cursor: 'pointer', fontSize: 14, fontFamily: C.font }}>✎</button>
              <button onClick={e => del(r.id, e)}
                style={{ background: 'none', border: 'none', color: '#666', cursor: 'pointer', fontSize: 15, fontFamily: C.font }}>✕</button>
              <div style={{ color: C.accent, fontSize: 20 }}>▶</div>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ================================================================
// ROUTINE BUILDER
// ================================================================
function RoutineBuilderScreen({ dbRef, onNavigate, params }) {
  const isEdit = !!params?.routineId;
  const [name, setName] = useState('');
  const [category, setCategory] = useState('Core');
  const [selected, setSelected] = useState([]);
  const [filterCat, setFilterCat] = useState('Core');
  const [ready, setReady] = useState(!isEdit);

  useEffect(() => {
    if (!isEdit || !dbRef.current) return;
    dbOp(dbRef.current, 'routines', 'readonly', s => s.get(params.routineId)).then(r => {
      if (r) { setName(r.name); setCategory(r.category); setSelected(r.exercises); setFilterCat(r.category); }
      setReady(true);
    });
  }, []);

  const toggleEx = id => setSelected(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

  const save = async () => {
    if (!name.trim() || selected.length === 0) return;
    let createdAt = Date.now();
    if (isEdit) {
      const existing = await dbOp(dbRef.current, 'routines', 'readonly', s => s.get(params.routineId));
      createdAt = existing?.createdAt || createdAt;
    }
    await dbOp(dbRef.current, 'routines', 'readwrite', s => s.put({
      id: params?.routineId || `r-${Date.now()}`,
      name: name.trim(), category, exercises: selected, createdAt, updatedAt: Date.now(),
    }));
    onNavigate('routines', {});
  };

  const filtered = EXERCISES.filter(e => e.cat === filterCat);

  if (!ready) return <Loader />;

  return (
    <div style={{ padding: '0 0 100px' }}>
      {/* Header */}
      <div style={{ padding: '16px 20px', display: 'flex', alignItems: 'center', gap: 12, borderBottom: `1px solid ${C.border}` }}>
        <button onClick={() => onNavigate('routines', {})} style={{ background: 'none', border: 'none', color: C.muted, cursor: 'pointer', fontSize: 20, fontFamily: C.font }}>←</button>
        <div style={{ color: C.text, fontSize: 16 }}>{isEdit ? 'Bewerken' : 'Nieuwe routine'}</div>
      </div>

      <div style={{ padding: '24px 20px' }}>
        {/* Name */}
        <div style={{ marginBottom: 22 }}>
          <Label>NAAM</Label>
          <input value={name} onChange={e => setName(e.target.value)} placeholder="Bijv. Ochtend core..."
            style={{ width: '100%', background: C.surface, border: `1px solid ${C.border}`, color: C.text,
              padding: '12px 14px', fontSize: 13, fontFamily: C.font, outline: 'none' }} />
        </div>

        {/* Category */}
        <div style={{ marginBottom: 24 }}>
          <Label>CATEGORIE</Label>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            {CATS.map(c => (
              <button key={c} onClick={() => setCategory(c)} style={{
                background: category === c ? (CAT_COLORS[c] || C.accent) : C.surface,
                color: category === c ? '#fff' : C.muted, border: `1px solid ${category === c ? 'transparent' : C.border}`,
                padding: '8px 14px', fontSize: 11, letterSpacing: '0.12em', cursor: 'pointer', fontFamily: C.font, textTransform: 'uppercase',
              }}>{c}</button>
            ))}
          </div>
        </div>

        {/* Exercise picker */}
        <div style={{ marginBottom: 24 }}>
          <Label>OEFENINGEN ({selected.length} geselecteerd)</Label>
          {/* Filter */}
          <div style={{ display: 'flex', gap: 6, marginBottom: 12, overflowX: 'auto', paddingBottom: 2 }}>
            {CATS.map(c => (
              <button key={c} onClick={() => setFilterCat(c)} style={{
                background: filterCat === c ? C.dim : 'transparent', color: filterCat === c ? C.text : C.muted,
                border: `1px solid ${filterCat === c ? C.border : 'transparent'}`, padding: '6px 12px', fontSize: 11,
                letterSpacing: '0.1em', cursor: 'pointer', fontFamily: C.font, textTransform: 'uppercase', whiteSpace: 'nowrap',
              }}>{c}</button>
            ))}
          </div>
          {filtered.map(ex => {
            const active = selected.includes(ex.id);
            return (
              <div key={ex.id} onClick={() => toggleEx(ex.id)} style={{
                border: `1px solid ${active ? C.accent : C.border}`, padding: '10px 14px', marginBottom: 6,
                cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                opacity: active ? 1 : 0.55,
              }}>
                <div style={{ flex: 1 }}>
                  <div style={{ color: active ? C.text : C.muted, fontSize: 13 }}>{ex.name}</div>
                  {ex.desc.split('\n').map((line, i) => (
                    <div key={i} style={{ color: i === 0 ? '#888' : '#666', fontSize: 11, marginTop: i === 0 ? 2 : 1 }}>{line}</div>
                  ))}
                </div>
                <div style={{ color: active ? (CAT_COLORS[ex.cat] || C.accent) : C.dim, fontSize: 16, marginLeft: 10 }}>{active ? '●' : '○'}</div>
              </div>
            );
          })}
        </div>

        {/* Selected order */}
        {selected.length > 0 && (
          <div style={{ marginBottom: 28 }}>
            <Label>VOLGORDE ({selected.length})</Label>
            {selected.map((id, i) => {
              const ex = EXERCISES.find(e => e.id === id);
              return (
                <div key={id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 0', borderBottom: `1px solid ${C.dim}` }}>
                  <span style={{ color: '#777', fontSize: 12, width: 18 }}>{i+1}</span>
                  <span style={{ color: C.text, fontSize: 13, flex: 1 }}>{ex?.name}</span>
                  <span style={{ color: CAT_COLORS[ex?.cat] || C.muted, fontSize: 10, marginRight: 4 }}>■</span>
                  <button onClick={() => setSelected(prev => prev.filter(x => x !== id))}
                    style={{ background: 'none', border: 'none', color: '#777', cursor: 'pointer', fontSize: 14 }}>✕</button>
                </div>
              );
            })}
          </div>
        )}

        {/* Spiervisualisatie cumulatief */}
        {selected.length > 0 && (() => {
          const exObjs = selected.map(id => EXERCISES.find(e => e.id === id)).filter(Boolean);
          const combined = mergeRoutineMuscles(exObjs);
          const hasMuscles = combined.muscles.primary.length > 0 || combined.muscles.secondary.length > 0;
          if (!hasMuscles) return null;
          return (
            <div style={{ border: `1px solid ${C.border}`, padding: '16px 14px', marginBottom: 24 }}>
              <Label>SPIEREN</Label>
              <BodyDiagram exercise={combined} height={220}/>
              <MuscleTags exercise={combined}/>
            </div>
          );
        })()}

        <Btn onClick={save} disabled={!name.trim() || selected.length === 0} style={{ width: '100%' }}>
          {isEdit ? 'OPSLAAN' : 'ROUTINE AANMAKEN'}
        </Btn>
      </div>
    </div>
  );
}

// ================================================================
// TIMER SCREEN
// ================================================================
function TimerScreen({ dbRef, onNavigate, params }) {
  const [routine, setRoutine] = useState(null);
  const [levelIdx, setLevelIdx] = useState(1);
  const [disabled, setDisabled] = useState(new Set());
  const [phase, setPhase] = useState('idle');
  const [countdown, setCountdown] = useState(3);
  const [stepIdx, setStepIdx] = useState(0);
  const [timeLeft, setTimeLeft] = useState(0);
  const [soundOn, setSoundOn] = useState(true);
  const [startTs, setStartTs] = useState(null);
  const intervalRef = useRef(null);
  const audioCtxRef = useRef(null);
  const wakeLockRef = useRef(null);

  useEffect(() => {
    if (!params?.routineId || !dbRef.current) return;
    dbOp(dbRef.current, 'routines', 'readonly', s => s.get(params.routineId)).then(r => setRoutine(r));
  }, [params?.routineId]);

  const exercises = useMemo(() => {
    if (!routine) return [];
    return routine.exercises.map(id => EXERCISES.find(e => e.id === id)).filter(Boolean);
  }, [routine]);

  const activeEx = useMemo(() => exercises.filter((_, i) => !disabled.has(i)), [exercises, disabled]);
  const sequence = useMemo(() => buildSequence(activeEx, levelIdx), [activeEx, levelIdx]);
  const totalDur = sequence.reduce((s, e) => s + e.duration, 0);
  const step = sequence[stepIdx];
  const elapsed = sequence.slice(0, stepIdx).reduce((s, e) => s + e.duration, 0) + ((step?.duration || 0) - timeLeft);
  const progress = totalDur > 0 ? Math.min(elapsed / totalDur, 1) : 0;
  const workSteps = sequence.filter(s => !s.isRest);
  const workIdx = sequence.slice(0, stepIdx + 1).filter(s => !s.isRest).length;

  const initAudio = () => { if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)(); };
  const reqWake = async () => { try { if ('wakeLock' in navigator) wakeLockRef.current = await navigator.wakeLock.request('screen'); } catch(e) {} };
  const relWake = () => { try { wakeLockRef.current?.release(); wakeLockRef.current = null; } catch(e) {} };

  useEffect(() => {
    const fn = () => { if (phase === 'running') reqWake(); };
    document.addEventListener('visibilitychange', fn);
    return () => document.removeEventListener('visibilitychange', fn);
  }, [phase]);

  // Countdown
  useEffect(() => {
    if (phase !== 'countdown') return;
    if (countdown <= 0) {
      setPhase('running'); setStepIdx(0); setTimeLeft(sequence[0]?.duration || 0);
      if (soundOn) beep(audioCtxRef.current, 880);
      return;
    }
    if (soundOn) beep(audioCtxRef.current, 660);
    const t = setTimeout(() => setCountdown(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, countdown]);

  // Beep on step change
  useEffect(() => {
    if (phase === 'running' && step && soundOn) beep(audioCtxRef.current, step.isRest ? 660 : 880);
  }, [stepIdx]);

  // Main interval
  useEffect(() => {
    if (phase !== 'running') return;
    intervalRef.current = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 1) {
          const next = stepIdx + 1;
          if (next >= sequence.length) {
            const dur = Math.floor((Date.now() - startTs) / 1000);
            saveSession(dur);
            setPhase('done'); relWake();
            clearInterval(intervalRef.current);
            return 0;
          }
          setStepIdx(next);
          return sequence[next].duration;
        }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(intervalRef.current);
  }, [phase, stepIdx, sequence.length]);

  const saveSession = async dur => {
    if (!dbRef.current || !routine) return;
    await dbOp(dbRef.current, 'sessions', 'readwrite', s => s.put({
      id: `s-${Date.now()}`, routineId: routine.id, routineName: routine.name,
      levelIdx, duration: dur, exercises: activeEx.map(e => e.name), completedAt: Date.now(),
    }));
  };

  const startWorkout = () => {
    if (!sequence.length) return;
    initAudio(); reqWake();
    setStartTs(Date.now()); setCountdown(3); setPhase('countdown');
  };

  const reset = () => {
    clearInterval(intervalRef.current); relWake();
    setPhase('idle'); setStepIdx(0); setTimeLeft(0); setCountdown(3);
  };

  const skip = () => {
    clearInterval(intervalRef.current);
    const next = stepIdx + 1;
    if (next >= sequence.length) { setPhase('done'); return; }
    setStepIdx(next); setTimeLeft(sequence[next].duration);
  };

  const totalMin = Math.floor(totalDur / 60), totalSec = totalDur % 60;
  const circ = 2 * Math.PI * 54;
  const strokeOff = step ? circ * (timeLeft / step.duration) : 0;
  const lvColor = LEVEL_COLORS[levelIdx];

  if (!routine) return <Loader />;

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '70px 20px 40px', fontFamily: C.font }}>

      {/* Fixed header */}
      <div style={{ position: 'fixed', top: 0, left: 0, right: 0, padding: '14px 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: C.bg, borderBottom: `1px solid ${C.dim}`, zIndex: 10 }}>
        <button onClick={() => { reset(); onNavigate('routines', {}); }} style={{ background: 'none', border: 'none', color: C.muted, cursor: 'pointer', fontSize: 20, fontFamily: C.font }}>←</button>
        <div style={{ color: C.text, fontSize: 12, letterSpacing: '0.1em' }}>{routine.name}</div>
        <button onClick={() => setSoundOn(v => !v)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 16, opacity: soundOn ? 1 : 0.3 }}>
          {soundOn ? '🔊' : '🔇'}
        </button>
      </div>

      {/* IDLE */}
      {phase === 'idle' && (
        <div style={{ width: '100%', maxWidth: 360 }}>
          {/* Level */}
          <div style={{ display: 'flex', gap: 6, marginBottom: 20, justifyContent: 'center' }}>
            {LEVELS.map((lv, i) => (
              <button key={i} onClick={() => setLevelIdx(i)} style={{
                background: i === levelIdx ? LEVEL_COLORS[i] : C.surface, color: i === levelIdx ? '#fff' : C.muted,
                border: `1px solid ${i === levelIdx ? 'transparent' : C.border}`, padding: '8px 14px',
                fontSize: 11, letterSpacing: '0.12em', cursor: 'pointer', fontFamily: C.font, textTransform: 'uppercase',
              }}>{lv}</button>
            ))}
          </div>

          {/* Exercise toggles */}
          <div style={{ border: `1px solid ${C.border}`, padding: '14px 16px', marginBottom: 20 }}>
            {exercises.map((ex, i) => {
              const active = !disabled.has(i);
              return (
                <div key={ex.id} onClick={() => setDisabled(prev => { const n = new Set(prev); active ? n.add(i) : n.delete(i); return n; })}
                  style={{ display: 'flex', alignItems: 'center', padding: '8px 0', borderBottom: i < exercises.length - 1 ? `1px solid ${C.dim}` : 'none', cursor: 'pointer', opacity: active ? 1 : 0.3, userSelect: 'none' }}>
                  <span style={{ color: active ? (CAT_COLORS[ex.cat] || lvColor) : C.dim, marginRight: 10, fontSize: 12 }}>{active ? '●' : '○'}</span>
                  <span style={{ flex: 1, color: active ? C.text : C.muted, fontSize: 14 }}>{ex.name}</span>
                  <span style={{ color: active ? (CAT_COLORS[ex.cat] || lvColor) : C.dim, fontSize: 13 }}>{ex.times[levelIdx]}s</span>
                </div>
              );
            })}
          </div>

          <div style={{ color: C.muted, fontSize: 13, letterSpacing: '0.08em', marginBottom: 20, textAlign: 'center' }}>
            {activeEx.length} oefeningen · {totalMin}:{String(totalSec).padStart(2,'0')} min
          </div>

          {/* Spiervisualisatie cumulatief voor actieve selectie */}
          {activeEx.length > 0 && (() => {
            const combined = mergeRoutineMuscles(activeEx);
            const hasMuscles = combined.muscles.primary.length > 0 || combined.muscles.secondary.length > 0;
            if (!hasMuscles) return null;
            return (
              <div style={{ border: `1px solid ${C.border}`, padding: '16px 14px', marginBottom: 20 }}>
                <Label>SPIEREN</Label>
                <BodyDiagram exercise={combined} height={220}/>
                <MuscleTags exercise={combined}/>
              </div>
            );
          })()}

          <Btn onClick={startWorkout} disabled={activeEx.length === 0} style={{ width: '100%' }}>START</Btn>
        </div>
      )}

      {/* COUNTDOWN */}
      {phase === 'countdown' && (
        <div style={{ textAlign: 'center' }}>
          <div style={{ color: C.muted, fontSize: 12, letterSpacing: '0.3em', marginBottom: 36 }}>KLAAR VOOR START</div>
          <div style={{ color: lvColor, fontSize: 110, fontWeight: 'bold', lineHeight: 1, minWidth: 100 }}>
            {countdown > 0 ? countdown : 'GO'}
          </div>
          {countdown > 0 && <div style={{ color: C.muted, fontSize: 13, marginTop: 24, letterSpacing: '0.1em' }}>{sequence[0]?.name}</div>}
        </div>
      )}

      {/* RUNNING / PAUSED */}
      {(phase === 'running' || phase === 'paused') && step && (
        <>
          <div style={{ color: C.muted, fontSize: 12, letterSpacing: '0.2em', marginBottom: 20 }}>
            {step.isRest ? 'RUST' : `OEFENING ${workIdx} / ${workSteps.length}`}
          </div>

          {/* Circle */}
          <div style={{ position: 'relative', width: 140, height: 140, marginBottom: 24 }}>
            <svg width="140" height="140" style={{ transform: 'rotate(-90deg)' }}>
              <circle cx="70" cy="70" r="54" fill="none" stroke={C.surface} strokeWidth="6" />
              <circle cx="70" cy="70" r="54" fill="none"
                stroke={step.isRest ? (step.isMid ? '#e0a000' : '#3daa5e') : lvColor}
                strokeWidth="6" strokeDasharray={circ} strokeDashoffset={strokeOff}
                strokeLinecap="round" style={{ transition: 'stroke-dashoffset 0.9s linear' }} />
            </svg>
            <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column' }}>
              <div style={{ color: step.isRest ? '#3daa5e' : lvColor, fontSize: 44, fontWeight: 'bold', lineHeight: 1 }}>{timeLeft}</div>
              <div style={{ color: C.muted, fontSize: 11, letterSpacing: '0.2em' }}>SEC</div>
            </div>
          </div>

          <div style={{ color: step.isRest ? (step.isMid ? '#e0a000' : '#3daa5e') : '#fff', fontSize: step.isRest ? 17 : 22, letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 8, textAlign: 'center' }}>
            {step.name}
          </div>
          <div style={{ textAlign: 'center', maxWidth: 280, marginBottom: 24 }}>
            {step.desc.split('\n').map((line, i) => (
              <div key={i} style={{ color: i === 0 ? '#ccc' : C.muted, fontSize: i === 0 ? 13 : 11, lineHeight: 1.6, marginBottom: i === 0 ? 4 : 0 }}>{line}</div>
            ))}
          </div>

          {/* Per-oefening spiervisualisatie (compact, alleen bij actieve oefening) */}
          {!step.isRest && step.muscles && (
            <div style={{ marginBottom: 16, opacity: 0.85 }}>
              <BodyDiagram exercise={step} height={120}/>
            </div>
          )}

          {sequence[stepIdx + 1] && !step.isRest && (
            <div style={{ color: '#777', fontSize: 12, letterSpacing: '0.12em', marginBottom: 28 }}>
              DAARNA → {sequence[stepIdx+1].name.toUpperCase()} ({sequence[stepIdx+1].duration}s)
            </div>
          )}

          {/* Progress */}
          <div style={{ width: 280, marginBottom: 28 }}>
            <div style={{ background: C.surface, height: 2 }}>
              <div style={{ background: lvColor, height: 2, width: `${progress * 100}%`, transition: 'width 1s linear', opacity: 0.55 }} />
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 6, color: C.muted, fontSize: 12 }}>
              <span>{Math.floor(elapsed/60)}:{String(elapsed%60).padStart(2,'0')}</span>
              <span>{totalMin}:{String(totalSec).padStart(2,'0')}</span>
            </div>
          </div>

          <div style={{ display: 'flex', gap: 8 }}>
            {phase === 'running'
              ? <Btn onClick={() => setPhase('paused')} bg={C.surface} color={C.muted}>PAUZE</Btn>
              : <Btn onClick={() => setPhase('running')} bg={lvColor}>VERDER</Btn>
            }
            <Btn onClick={skip} bg={C.surface} color={C.muted}>SLA OVER</Btn>
            <Btn onClick={reset} bg={C.surface} color="#333">RESET</Btn>
          </div>
        </>
      )}

      {/* DONE */}
      {phase === 'done' && (
        <div style={{ textAlign: 'center' }}>
          <div style={{ color: C.accent, fontSize: 72, marginBottom: 12 }}>✓</div>
          <div style={{ color: C.text, fontSize: 22, letterSpacing: '0.1em', marginBottom: 6 }}>KLAAR</div>
          <div style={{ color: C.muted, fontSize: 11, letterSpacing: '0.1em', marginBottom: 36 }}>Sessie opgeslagen</div>
          <div style={{ display: 'flex', gap: 10, justifyContent: 'center' }}>
            <Btn onClick={reset}>OPNIEUW</Btn>
            <Btn onClick={() => onNavigate('home', {})} bg={C.surface} color={C.muted}>HOME</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

// ================================================================
// HISTORY SCREEN
// ================================================================
function HistoryScreen({ dbRef }) {
  const [sessions, setSessions] = useState([]);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    if (!dbRef.current) return;
    dbGetAll(dbRef.current, 'sessions').then(s => {
      setSessions(s.sort((a, b) => b.completedAt - a.completedAt));
      setReady(true);
    });
  }, []);

  const streak = useMemo(() => calcStreak(sessions), [sessions]);
  const totalTime = sessions.reduce((s, e) => s + (e.duration || 0), 0);

  if (!ready) return <Loader />;

  return (
    <div style={{ padding: '36px 20px 100px' }}>
      <div style={{ color: C.text, fontSize: 22, marginBottom: 24 }}>Geschiedenis</div>

      {/* Stats */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 28 }}>
        {[
          { label: 'SESSIES', value: sessions.length },
          { label: 'STREAK', value: `${streak}d` },
          { label: 'TOTAAL', value: `${Math.floor(totalTime/60)}m` },
        ].map(({ label, value }) => (
          <div key={label} style={{ flex: 1, border: `1px solid ${C.border}`, padding: '14px 10px', textAlign: 'center' }}>
            <div style={{ color: C.accent, fontSize: 24, fontWeight: 'bold', marginBottom: 4 }}>{value}</div>
            <div style={{ color: C.muted, fontSize: 11, letterSpacing: '0.15em' }}>{label}</div>
          </div>
        ))}
      </div>

      {sessions.length === 0 && (
        <div style={{ textAlign: 'center', padding: '60px 0', color: C.muted, fontSize: 12 }}>Nog geen sessies afgerond.</div>
      )}

      {sessions.map(s => (
        <div key={s.id} style={{ borderBottom: `1px solid ${C.border}`, padding: '14px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
          <div>
            <div style={{ color: C.text, fontSize: 13, marginBottom: 4 }}>{s.routineName}</div>
            <div style={{ color: C.muted, fontSize: 11 }}>
              {LEVELS[s.levelIdx]} · {s.exercises?.length || 0} oef · {Math.floor(s.duration/60)}:{String(s.duration%60).padStart(2,'0')} min
            </div>
          </div>
          <div style={{ color: C.muted, fontSize: 11, textAlign: 'right', flexShrink: 0, marginLeft: 12 }}>
            {new Date(s.completedAt).toLocaleDateString('nl-NL', { weekday: 'short', day: 'numeric', month: 'short' })}
          </div>
        </div>
      ))}
    </div>
  );
}

// ================================================================
// SHARED COMPONENTS
// ================================================================
function Loader() {
  return (
    <div style={{ color: C.muted, textAlign: 'center', paddingTop: 100, fontSize: 11, letterSpacing: '0.3em', fontFamily: C.font }}>
      LADEN...
    </div>
  );
}

function BottomNav({ current, onNavigate }) {
  return (
    <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, background: C.bg, borderTop: `1px solid ${C.border}`, display: 'flex', zIndex: 100 }}>
      {[
        { id: 'home', label: 'HOME', icon: '⌂' },
        { id: 'routines', label: 'ROUTINES', icon: '≡' },
        { id: 'history', label: 'HISTORY', icon: '◷' },
      ].map(t => (
        <button key={t.id} onClick={() => onNavigate(t.id, {})} style={{ flex: 1, background: 'none', border: 'none', padding: '12px 0', cursor: 'pointer', fontFamily: C.font }}>
          <div style={{ fontSize: 20, color: current === t.id ? C.accent : '#555', marginBottom: 2 }}>{t.icon}</div>
          <div style={{ fontSize: 11, letterSpacing: '0.12em', color: current === t.id ? C.accent : C.muted }}>{t.label}</div>
        </button>
      ))}
    </div>
  );
}

// ================================================================
// APP
// ================================================================
function App() {
  const [screen, setScreen] = useState('home');
  const [params, setParams] = useState({});
  const [ready, setReady] = useState(false);
  const dbRef = useRef(null);

  useEffect(() => {
    initDB().then(async db => {
      dbRef.current = db;
      // Seed default Core routine if empty
      const existing = await dbGetAll(db, 'routines');
      if (existing.length === 0) {
        await dbOp(db, 'routines', 'readwrite', s => s.put(DEFAULT_ROUTINE));
      }
      setReady(true);
    }).catch(() => setReady(true));
  }, []);

  const navigate = useCallback((s, p = {}) => { setScreen(s); setParams(p); }, []);
  const showNav = !['timer', 'builder'].includes(screen);

  if (!ready) return (
    <div style={{ background: C.bg, minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: C.font }}>
      <div style={{ color: C.accent, fontSize: 18, letterSpacing: '0.4em' }}>TRAINR</div>
    </div>
  );

  return (
    <div style={{ background: C.bg, minHeight: '100vh', fontFamily: C.font, color: C.text }}>
      {screen === 'home'     && <HomeScreen dbRef={dbRef} onNavigate={navigate} />}
      {screen === 'routines' && <RoutinesScreen dbRef={dbRef} onNavigate={navigate} />}
      {screen === 'builder'  && <RoutineBuilderScreen dbRef={dbRef} onNavigate={navigate} params={params} />}
      {screen === 'timer'    && <TimerScreen dbRef={dbRef} onNavigate={navigate} params={params} />}
      {screen === 'history'  && <HistoryScreen dbRef={dbRef} />}
      {showNav && <BottomNav current={screen} onNavigate={navigate} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>
</body>
</html>
