<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ================================================================
// DB LAYER
// ================================================================
const DB_NAME = 'trainr_v1';
const DB_VERSION = 5;
const DEV_MODE = ['localhost', '127.0.0.1'].includes(window.location.hostname);

// UI-strings die op meerdere plekken voorkomen
const MSG_RESET_ONBOARDING = 'Onboarding opnieuw starten? Je profiel blijft bewaard.';

const initDB = () => new Promise((resolve, reject) => {
  const req = indexedDB.open(DB_NAME, DB_VERSION);
  req.onupgradeneeded = e => {
    const db = e.target.result;
    const old = e.oldVersion;

    if (!db.objectStoreNames.contains('routines')) db.createObjectStore('routines', { keyPath: 'id' });
    if (!db.objectStoreNames.contains('sessions')) db.createObjectStore('sessions', { keyPath: 'id' });

    // v4: profile store omgebouwd naar KV-schema { key, value }
    if (old < 4) {
      if (db.objectStoreNames.contains('profile')) db.deleteObjectStore('profile');
      db.createObjectStore('profile', { keyPath: 'key' });
    } else if (!db.objectStoreNames.contains('profile')) {
      db.createObjectStore('profile', { keyPath: 'key' });
    }
    if (!db.objectStoreNames.contains('events')) db.createObjectStore('events', { keyPath: 'id' });
  };
  req.onsuccess = e => resolve(e.target.result);
  req.onerror = e => reject(e.target.error);
});

// Profile helpers — KV store: { key, value } per record
const getProfile = async db => {
  const entries = await dbGetAll(db, 'profile');
  if (!entries.length) return null;
  return Object.fromEntries(entries.map(e => [e.key, e.value]));
};
const setProfileField = (db, key, value) =>
  dbOp(db, 'profile', 'readwrite', s => s.put({ key, value }));
const saveProfile = async (db, profile) => {
  const FIELDS = [
    'name', 'age', 'gender', 'height', 'weight', 'weightStart', 'weightGoal',
    'level', 'goal', 'trainingGoal', 'availableDays',
    'selectedPlanId', 'planConfirmed', 'starterPlanProfile', 'starterPlanSelection',
    'onboardingComplete', 'createdAt',
    'notificationsEnabled', 'notificationDays', 'notificationTime', 'notificationPermissionState', 'lastReminderAt', 'lastFollowupAt',
  ];
  await Promise.all(
    FIELDS
      .filter(k => profile[k] !== undefined && profile[k] !== null)
      .map(k => setProfileField(db, k, profile[k]))
  );
  await setProfileField(db, 'updatedAt', Date.now());
};

const SAFE_STARTER_PROFILE = 'core_beginner_3d';
function resolveStarterPlanProfile({ level, trainingGoal, availableDays }) {
  const validDays = Number.isInteger(availableDays) && availableDays > 0;
  if (!level || !trainingGoal || !validDays) {
    return {
      profileId: SAFE_STARTER_PROFILE,
      fallbackReason: 'missing_or_inconsistent_onboarding_data',
      routineId: DEFAULT_ROUTINE.id,
    };
  }

  const daysBucket = availableDays >= 4 ? '4d' : '3d';
  let goalKey = 'core';
  if (trainingGoal === 'fatloss') goalKey = 'fatloss';
  if (trainingGoal === 'muscle') goalKey = 'muscle';
  const levelKey = level === 'beginner' ? 'beginner' : 'starter';
  const profileId = `${goalKey}_${levelKey}_${daysBucket}`;
  return { profileId, fallbackReason: null, routineId: DEFAULT_ROUTINE.id };
}

// MET-waarden per categorie (Compendium of Physical Activities)
const MET_BY_CAT = { Core: 4.0, Push: 5.0, Pull: 5.0, Legs: 5.5, Cardio: 8.0 };
const MET_REST = 1.5;
const MET_SESSION = { Core: 3.5, Push: 4.0, Legs: 5.0, Pull: 4.0, Cardio: 7.0 };

function calcSessionKcal(exercises, durationSec, weightKg) {
  if (!weightKg || !durationSec || !exercises?.length) return 0;
  const counts = {};
  exercises.forEach(ex => { counts[ex.cat] = (counts[ex.cat] || 0) + 1; });
  let dom = exercises[0].cat, max = 0;
  const seen = new Set();
  for (const ex of exercises) {
    if (seen.has(ex.cat)) continue;
    seen.add(ex.cat);
    if (counts[ex.cat] > max) { max = counts[ex.cat]; dom = ex.cat; }
  }
  return Math.round((MET_SESSION[dom] || 4.0) * weightKg * (durationSec / 3600));
}

// Calorieën voor een lijst oefeningen + duur (seconden) bij gegeven gewicht
// Verdeling: ~70% van duur = oefening (gemiddelde MET van categorieën), ~30% rust
function calcCalories(exercises, durationSec, weightKg) {
  if (!weightKg || !durationSec || !exercises?.length) return 0;
  const avgMet = exercises.reduce((sum, ex) => sum + (MET_BY_CAT[ex.category] || 5.0), 0) / exercises.length;
  const exerciseHours = (durationSec * 0.7) / 3600;
  const restHours = (durationSec * 0.3) / 3600;
  return Math.round(avgMet * weightKg * exerciseHours + MET_REST * weightKg * restHours);
}

// BMI helpers
function calcBMI(weightKg, heightCm) {
  if (!weightKg || !heightCm) return 0;
  const m = heightCm / 100;
  return weightKg / (m * m);
}
function bmiCategory(bmi) {
  if (bmi < 18.5) return { label: 'ONDERGEWICHT', color: '#69A6FF' };
  if (bmi < 25)   return { label: 'GEZOND',       color: '#6BE89B' };
  if (bmi < 30)   return { label: 'OVERGEWICHT',  color: '#FFB454' };
  return            { label: 'OBESITAS',         color: '#FF5A5A' };
}

const dbOp = (db, store, mode, fn) => new Promise((resolve, reject) => {
  const tx = db.transaction(store, mode);
  const req = fn(tx.objectStore(store));
  req.onsuccess = e => resolve(e.target.result);
  req.onerror = e => reject(e.target.error);
});

const dbGetAll = (db, store) => new Promise((resolve, reject) => {
  const tx = db.transaction(store, 'readonly');
  const req = tx.objectStore(store).getAll();
  req.onsuccess = e => resolve(e.target.result || []);
  req.onerror = e => reject(e.target.error);
});

function getUserId(profile) {
  return profile?.createdAt ? `u-${profile.createdAt}` : 'u-anon';
}
function getSessionId() {
  if (!window.__trainrSessionId) window.__trainrSessionId = `sess-${Date.now()}`;
  return window.__trainrSessionId;
}
async function storeEventRecord(db, record) {
  await dbOp(db, 'events', 'readwrite', s => s.put(record));
}
function trackEventFactory(dbRef) {
  return async (name, meta = {}, opts = {}) => {
    const profile = dbRef.current ? await getProfile(dbRef.current) : null;
    const evt = {
      id: `evt-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
      event: name,
      ts: Date.now(),
      userId: getUserId(profile),
      sessionId: opts.sessionId || getSessionId(),
      planId: opts.planId || null,
      meta: typeof meta === 'object' && meta !== null ? meta : { value: meta },
    };
    try {
      if (dbRef.current) await storeEventRecord(dbRef.current, evt);
      else throw new Error('db_not_ready');
    } catch (err) {
      const key = 'trainr_events_fallback';
      const prev = JSON.parse(localStorage.getItem(key) || '[]');
      prev.push(evt);
      localStorage.setItem(key, JSON.stringify(prev));
      console.warn('[analytics] IndexedDB write failed, used localStorage fallback.', err?.message || err);
    }
    return evt;
  };
}
async function loadAllEvents(db) {
  const idbEvents = db ? await dbGetAll(db, 'events') : [];
  const fallback = JSON.parse(localStorage.getItem('trainr_events_fallback') || '[]');
  return [...idbEvents, ...fallback].sort((a, b) => a.ts - b.ts);
}
function computeKpis(events) {
  const byUser = new Map();
  events.forEach(e => {
    if (!byUser.has(e.userId)) byUser.set(e.userId, []);
    byUser.get(e.userId).push(e);
  });
  let onboarded = 0, activated = 0, d7Users = 0, activeUsers = 0, weekWorkouts = 0;
  for (const [, ue] of byUser) {
    const ob = ue.find(e => e.event === 'onboarding_completed');
    const wc = ue.filter(e => e.event === 'workout_completed');
    if (ob) {
      onboarded += 1;
      if (wc.some(w => w.ts >= ob.ts && w.ts <= ob.ts + 24 * 3600 * 1000)) activated += 1;
      const d7s = new Date(ob.ts + 7 * 24 * 3600 * 1000).toDateString();
      if (ue.some(e => new Date(e.ts).toDateString() === d7s)) d7Users += 1;
    }
    const weekAgo = Date.now() - 7 * 24 * 3600 * 1000;
    const hasWeekActivity = ue.some(e => e.ts >= weekAgo);
    if (hasWeekActivity) activeUsers += 1;
    weekWorkouts += wc.filter(w => w.ts >= weekAgo).length;
  }
  return {
    events7d: events.filter(e => e.ts >= Date.now() - 7 * 24 * 3600 * 1000).length,
    activation24h: onboarded ? activated / onboarded : 0,
    d7Retention: onboarded ? d7Users / onboarded : 0,
    d7ByUser: Object.fromEntries([...byUser.keys()].map(userId => {
      const ue = byUser.get(userId);
      const ob = ue.find(e => e.event === 'onboarding_completed');
      const d7 = ob ? ue.some(e => new Date(e.ts).toDateString() === new Date(ob.ts + 7 * 24 * 3600 * 1000).toDateString()) : false;
      return [userId, d7];
    })),
    workoutsPerActiveUserWeek: activeUsers ? weekWorkouts / activeUsers : 0,
  };
}

function buildHighlighted(ex) {
  const h = {};
  (ex.muscles?.secondary || []).forEach(m => { h[m] = 'secondary'; });
  (ex.muscles?.primary   || []).forEach(m => { h[m] = 'primary';   });
  return h;
}
function detectViews(h) {
  let f = false, b = false;
  for (const m of Object.keys(h)) {
    const v = MUSCLE_CONFIG[m]?.view;
    if (v === 'front' || v === 'both') f = true;
    if (v === 'back'  || v === 'both') b = true;
  }
  if (f && b) return 'both';
  return b ? 'back' : 'front';
}
function zoneStyle(name, h) {
  const lvl = h[name] || 'none';
  return { fill: MUSCLE_COLORS[lvl].fill, stroke: MUSCLE_COLORS[lvl].stroke, strokeWidth: 0.6 };
}
function mergeRoutineMuscles(exercises) {
  const prim = new Set(), sec = new Set();
  exercises.forEach(ex => {
    (ex.muscles?.primary   || []).forEach(m => prim.add(m));
    (ex.muscles?.secondary || []).forEach(m => sec.add(m));
  });
  prim.forEach(m => sec.delete(m));
  return { name: 'Routine', muscles: { primary: [...prim], secondary: [...sec] } };
}
function pickStroke(level) {
  if (level === 'primary')   return '#E8FE3C';
  if (level === 'secondary') return '#76840F';

}

function BodyDiagram({ exercise, height = 260 }) {
  const h     = React.useMemo(() => buildHighlighted(exercise), [exercise]);
  const views = detectViews(h);
  const both  = views === 'both';
  const figW  = height * (100 / 244);
  const lbl   = { textAlign: 'center', fontSize: 12, letterSpacing: 2, color: C.muted, marginBottom: 4, fontFamily: 'var(--font-mono)' };
  return (
    <div style={{ display: 'flex', gap: 14, justifyContent: 'center', alignItems: 'flex-start' }}>
      {(views === 'front' || both) && (
        <div style={{ width: figW, flexShrink: 0 }}>
          <div style={lbl}>VOOR</div>
          <div style={{ height }}><FrontBody h={h}/></div>
        </div>
      )}
      {(views === 'back' || both) && (
        <div style={{ width: figW, flexShrink: 0 }}>
          <div style={lbl}>ACHTER</div>
          <div style={{ height }}><BackBody h={h}/></div>
        </div>
      )}
    </div>
  );
}

function MuscleTags({ exercise }) {
  const { primary = [], secondary = [] } = exercise.muscles || {};
  const tag = (m, level) => (
    <span key={m} style={{
      display: 'inline-block', padding: '3px 8px', borderRadius: 4,
      background: level === 'primary' ? 'rgba(232,254,60,0.12)' : 'rgba(255,255,255,0.06)',
      color:      level === 'primary' ? '#E8FE3C' : C.muted,
      fontFamily: 'var(--font-mono)', fontSize: 12, letterSpacing: '0.08em',
      marginRight: 5, marginBottom: 4,

  );
  return (
    <div style={{ marginTop: 12, paddingTop: 12, borderTop: '1px solid rgba(255,255,255,0.06)' }}>
      {primary.length > 0 && (
        <div style={{ marginBottom: 8 }}>

const DEFAULT_TARGETS_BY_MODE = {
  time: { beginner: 20, intermediate: 40, expert: 60 },
  reps: { beginner: 8, intermediate: 12, expert: 16 },
};
const EXERCISE_CONFIGS = {
  plank: { mode: 'time', targets: { beginner: 30, intermediate: 60, expert: 90 } },
  'side-l': { mode: 'time', targets: { beginner: 20, intermediate: 40, expert: 60 } },
  'side-r': { mode: 'time', targets: { beginner: 20, intermediate: 40, expert: 60 } },
  pushup: { mode: 'reps', targets: { beginner: 8, intermediate: 15, expert: 25 } },
  squats: { mode: 'reps', targets: { beginner: 12, intermediate: 20, expert: 35 } },
  'alt-lunges': { mode: 'reps', targets: { beginner: 8, intermediate: 12, expert: 20 } },
  dips: { mode: 'reps', targets: { beginner: 6, intermediate: 12, expert: 20 } },
  burpees: { mode: 'hybrid', targets: { beginner: 8, intermediate: 12, expert: 18 } },
  'mountain-cl': { mode: 'time', targets: { beginner: 20, intermediate: 35, expert: 50 } },
  'mt-cl-fast': { mode: 'time', targets: { beginner: 20, intermediate: 35, expert: 50 } },
};
const EXERCISES_WITH_MODE = EXERCISES.map(ex => {
  const cfg = EXERCISE_CONFIGS[ex.id] || {};
  const mode = cfg.mode || 'time';
  const t = cfg.targets || (mode === 'reps' ? DEFAULT_TARGETS_BY_MODE.reps : DEFAULT_TARGETS_BY_MODE.time);
  return { ...ex, mode, targets: t, times: ex.times || [t.beginner, t.intermediate, t.expert] };
});

const CATS = ['Core', 'Armen', 'Legs', 'Full Body'];
const LEVELS = ['BEGINNER', 'INTERMEDIATE', 'EXPERT'];
const LEVEL_COLORS = ['#6BE89B', '#FFB454', '#FF5A5A'];
const CAT_COLORS = { Core: '#E8FE3C', Armen: '#FFB454', Legs: '#6BE89B', 'Full Body': '#FF5A5A' };

function getRoutineCategories(exerciseIds) {
  const seen = new Set();
  const cats = [];
  exerciseIds.forEach(id => {
    const ex = EXERCISES_WITH_MODE.find(e => e.id === id);
    if (ex && !seen.has(ex.cat)) { seen.add(ex.cat); cats.push(ex.cat); }
  });
  return cats;
}

function CatTags({ exerciseIds, count }) {
  const cats = getRoutineCategories(exerciseIds);
  return (
    <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
      {cats.map(cat => (
        <span key={cat} style={{ display: 'inline-flex', alignItems: 'center', gap: 3, color: CAT_COLORS[cat], fontSize: 12, letterSpacing: '0.12em' }}>
          ■ {cat.toUpperCase()}
        </span>
      ))}
      {count != null && <span style={{ color: C.muted, fontSize: 12 }}>· {count} OEF</span>}
    </div>
  );
}

function selectDefaultPlan(profile) {
  if (!profile) return BUILTIN_PLANS[0].id;
  const goal = profile.goal || ((profile.weightGoal && profile.weight && profile.weightGoal < profile.weight) ? 'fat_loss' : 'fitness');
  if (goal === 'core_strength') return 'core-30';
  if (profile.level === 'beginner') return 'consistency-21';
  if (goal === 'fitness') return 'fit-28';
  return 'fit-28';
}

function isPlanDayUnlocked(plan, dayNumber, sessions) {
  if (dayNumber === 1) return true;
  const prevDay = plan.days.find(d => d.day === dayNumber - 1);
  if (!prevDay) return false;
  if (prevDay.restDay) return isPlanDayUnlocked(plan, dayNumber - 1, sessions);
  return sessions.some(s => s.planId === plan.id && s.planDay === dayNumber - 1);
}

function isPlanDayCompleted(plan, dayNumber, sessions) {
  const day = plan.days.find(d => d.day === dayNumber);
  if (!day) return false;
  if (day.restDay) {
    const nextDay = plan.days.find(d => d.day === dayNumber + 1);
    if (!nextDay) return true;
    return isPlanDayUnlocked(plan, dayNumber + 1, sessions);
  }
  return sessions.some(s => s.planId === plan.id && s.planDay === dayNumber);
}

// ================================================================
// AUDIO
// ================================================================
function beep(ctx, type = 'tick') {
  if (!ctx) return;
  try {
    const cues = {
      tick:     [{ f: 440,  t: 0,    d: 0.08, g: 0.30, w: 'sine'   }],
      go:       [{ f: 660,  t: 0,    d: 0.10, g: 0.40, w: 'square' },
                 { f: 880,  t: 0.13, d: 0.10, g: 0.40, w: 'square' },
                 { f: 1100, t: 0.26, d: 0.18, g: 0.50, w: 'square' }],
      exercise: [{ f: 880,  t: 0,    d: 0.10, g: 0.40, w: 'square' },
                 { f: 1100, t: 0.13, d: 0.18, g: 0.50, w: 'square' }],
      rest:     [{ f: 660,  t: 0,    d: 0.30, g: 0.25, w: 'sine'   }],
      warn:     [{ f: 440,  t: 0,    d: 0.06, g: 0.20, w: 'sine'   }],
    }[type] || [];
    cues.forEach(({ f, t, d, g, w }) => {
      const o = ctx.createOscillator(), gn = ctx.createGain();
      o.connect(gn); gn.connect(ctx.destination);
      o.type = w; o.frequency.value = f;
      gn.gain.setValueAtTime(0, ctx.currentTime + t);
      gn.gain.linearRampToValueAtTime(g, ctx.currentTime + t + 0.01);
      gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + d);
      o.start(ctx.currentTime + t);
      o.stop(ctx.currentTime + t + d + 0.02);
    });
  } catch(e) {}
}

function buildSequence(exercises, levelIdx) {
  const seq = [];
  const midIdx = Math.floor(exercises.length / 2) - 1;
  exercises.forEach((ex, i) => {
    const mode = ex.mode || 'time';
    seq.push({
      ...ex,
      mode,
      target: ex.targets?.[['beginner','intermediate','expert'][levelIdx]] || ex.times?.[levelIdx] || 0,
      targetReps: (mode === 'reps' || mode === 'hybrid') ? (ex.targets?.[['beginner','intermediate','expert'][levelIdx]] || 10) : null,
      duration: mode === 'time' ? (ex.targets?.[['beginner','intermediate','expert'][levelIdx]] || ex.times[levelIdx]) : 0,
      isRest: false
    });
    if (i < exercises.length - 1) {
      const isMid = i === midIdx;
      seq.push({
        id: `rest-${i}`, name: isMid ? 'Halverwege · rust' : 'Rust',
        desc: isMid ? 'Goed bezig! Bijna klaar.' : 'Pak even adem.',
        duration: isMid ? 10 : 5, isRest: true, isMid,
      });
    }
  });
  return seq;
}

function calcStreak(sessions) {
  if (!sessions.length) return 0;
  const days = new Set(sessions.map(s => new Date(s.completedAt).toDateString()));
  let count = 0;
  const d = new Date();
  // check from today
  while (days.has(d.toDateString())) { count++; d.setDate(d.getDate() - 1); }
  // if today not done, check from yesterday
  if (count === 0) {
    d.setDate(d.getDate() - 1);
    while (days.has(d.toDateString())) { count++; d.setDate(d.getDate() - 1); }
  }
  return count;
}

function PlanTab({ sessions, profile, onProfileUpdate, onNavigate }) {
  const defaultPlanId = selectDefaultPlan(profile);
  const selectedPlanId = profile?.selectedPlanId || defaultPlanId;
  const plan = BUILTIN_PLANS.find(p => p.id === selectedPlanId) || BUILTIN_PLANS[0];
  const hasPlanSession = sessions.some(s => s.planId);
  const needsPlanConfirmation = !profile?.planConfirmed && !hasPlanSession;
  const workDays = plan.days.filter(d => !d.restDay);
  const completedCount = workDays.filter(d => isPlanDayCompleted(plan, d.day, sessions)).length;
  const currentDay = workDays.find(d =>
    !isPlanDayCompleted(plan, d.day, sessions) && isPlanDayUnlocked(plan, d.day, sessions)
  ) || null;

  const startPlanDay = (day) => {
    const routine = {
      id: `plan-${plan.id}-day-${day.day}`,
      name: `DAG ${day.day} — ${plan.title}`,
      exercises: day.exercises,
      category: 'Core',
    };
    onNavigate('timer', { routine, planId: plan.id, planDay: day.day, backTo: 'home' });
  };

  const pct = workDays.length > 0 ? (completedCount / workDays.length) * 100 : 0;

  const IcoCheck = () => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6BE89B" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
  );
  const IcoLock = () => (
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  );
  const IcoMoon = () => (
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  );

  return (
    <>
      {/* Header */}
      <div style={{ padding: '0 20px 16px' }}>
        <div style={{ fontFamily: C.mono, fontSize: 26, fontWeight: 700, letterSpacing: '-0.03em', lineHeight: 1.1, color: C.text, marginBottom: 4 }}>
          {plan.title.toUpperCase()}
        </div>
        <div style={{ fontFamily: C.mono, fontSize: 13, letterSpacing: '0.10em', color: C.secondary }}>
          {plan.subtitle}
        </div>
      </div>

      {needsPlanConfirmation && (
        <div style={{ padding: '0 20px 14px' }}>
          <div style={{ border: `1px solid ${C.borderMd}`, borderRadius: 10, padding: 12, background: C.surface }}>
            <div style={{ fontFamily: C.mono, fontSize: 11, letterSpacing: '0.10em', color: C.muted, marginBottom: 10 }}>KIES JE STARTPLAN</div>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {BUILTIN_PLANS.map(p => (
                <button key={p.id} onClick={() => onProfileUpdate({ selectedPlanId: p.id })} style={{ padding: '8px 10px', borderRadius: 8, border: `1px solid ${selectedPlanId === p.id ? p.color : C.borderMd}`, background: selectedPlanId === p.id ? 'rgba(232,254,60,0.08)' : 'transparent', color: selectedPlanId === p.id ? C.text : C.muted, fontFamily: C.mono, fontSize: 11 }}>{p.title}</button>
              ))}
            </div>
            <button onClick={() => onProfileUpdate({ selectedPlanId, planConfirmed: true })} style={{ marginTop: 10, width: '100%', padding: '10px 12px', borderRadius: 8, border: `1px solid ${C.accent}`, background: C.accent, color: C.accentFg, fontFamily: C.mono, fontSize: 12 }}>BEVESTIG PLAN</button>
          </div>
        </div>
      )}
      <div style={{ padding: '0 20px 14px', fontFamily: C.mono, fontSize: 12, letterSpacing: '0.06em', color: C.muted }}>
        Dit plan is gekozen op basis van jouw doel + niveau.
      </div>

      {/* Progress bar */}
      <div style={{ padding: '0 20px 20px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
          <div style={{ fontFamily: C.mono, fontSize: 12, letterSpacing: '0.12em', color: C.muted }}>VOORTGANG</div>
          <div style={{ fontFamily: C.mono, fontSize: 13, color: plan.color }}>{completedCount} / {workDays.length} DAGEN</div>
        </div>
        <div style={{ height: 4, background: C.surface, borderRadius: 2, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${pct}%`, background: plan.color, borderRadius: 2 }} />
        </div>
      </div>

      {/* Days list */}
      <div style={{ padding: '0 20px', display: 'flex', flexDirection: 'column', gap: 8, paddingBottom: 24 }}>
        {plan.days.map(day => {
          const completed = !day.restDay && isPlanDayCompleted(plan, day.day, sessions);
          const isCurrent = !day.restDay && currentDay?.day === day.day;
          const unlocked = isPlanDayUnlocked(plan, day.day, sessions);

          return (
            <div key={day.day} style={{
              display: 'flex', alignItems: 'center', gap: 12,
              background: C.surface,
              border: `1px solid ${isCurrent ? C.accent : completed ? 'rgba(107,232,155,0.22)' : C.border}`,
              borderRadius: 10, padding: '13px 16px',
              opacity: !day.restDay && !unlocked && !completed ? 0.38 : 1,
            }}>
              {/* Status icon left */}
              <div style={{ width: 20, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                {completed ? <IcoCheck /> : day.restDay ? <IcoMoon /> : null}
              </div>

              {/* Text */}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{
                  fontFamily: C.mono, fontSize: 14, letterSpacing: '0.08em', fontWeight: 600,
                  color: completed ? C.muted : day.restDay ? C.muted : isCurrent ? C.accent : C.secondary,
                }}>
                  {day.restDay ? `DAG ${day.day} — RUST` : `DAG ${day.day}`}
                </div>
                {!day.restDay && !completed && (
                  <div style={{ fontFamily: C.mono, fontSize: 12, color: C.muted, marginTop: 3, letterSpacing: '0.06em' }}>
                    {day.exercises.length} OEF
                  </div>
                )}
              </div>

              {/* Action right */}
              {!day.restDay && !completed && unlocked && !needsPlanConfirmation && (
                <button onClick={() => startPlanDay(day)} style={{
                  fontFamily: C.mono, fontSize: 12, letterSpacing: '0.12em', fontWeight: 600,
                  background: isCurrent ? C.accent : 'transparent',
                  color: isCurrent ? C.accentFg : C.secondary,
                  border: `1px solid ${isCurrent ? C.accent : C.borderMd}`,
                  borderRadius: 6, padding: '8px 12px',
                  cursor: 'pointer', flexShrink: 0,
                }}>START</button>
              )}
              {!day.restDay && !completed && !unlocked && <IcoLock />}
            </div>
          );
        })}
      </div>
    </>
  );
}

function HomeScreen({ dbRef, onNavigate, analytics }) {
  const [activeTab, setActiveTab] = useState('home');
  const [sessions, setSessions] = useState([]);
  const [routines, setRoutines] = useState([]);
  const [profile, setProfile] = useState(null);
  const [ready, setReady] = useState(false);
  const [starterCTA, setStarterCTA] = useState(null);

  useEffect(() => {
    if (!dbRef.current) return;
    Promise.all([
      dbGetAll(dbRef.current, 'sessions'),
      dbGetAll(dbRef.current, 'routines'),
      getProfile(dbRef.current),
    ]).then(([s, r, prof]) => {
      setSessions(s.sort((a, b) => b.completedAt - a.completedAt));
      setRoutines(r);
      setProfile(prof);
      setStarterCTA({
        show: !s.length,
        profileId: prof?.starterPlanProfile || SAFE_STARTER_PROFILE,
        routineId: prof?.starterPlanSelection?.auto?.routineId || DEFAULT_ROUTINE.id,
        fallback: !!prof?.starterPlanSelection?.fallbackReason,
      });
      setReady(true);
    });
  }, []);

  const streak = useMemo(() => calcStreak(sessions), [sessions]);
  const today = new Date();
  const todayDone = sessions.some(s => new Date(s.completedAt).toDateString() === today.toDateString());
  const hours = today.getHours();
  const greeting = hours < 6 ? 'GOEDE NACHT' : hours < 12 ? 'GOEDEMORGEN' : hours < 18 ? 'GOEDEMIDDAG' : 'GOEDENAVOND';

  const quickRoutines = routines.filter(r => r.quickStart !== false);

  const tabBtn = (tab) => ({
    flex: 1, padding: '10px 0',
    background: activeTab === tab ? C.accent : 'transparent',
    color: activeTab === tab ? C.accentFg : C.text,
    border: `1px solid ${activeTab === tab ? C.accent : '#555'}`,
    borderRadius: 8,
    fontFamily: C.mono, fontSize: 12, letterSpacing: '0.14em', fontWeight: 600,
    cursor: 'pointer',
  });

  if (!ready) return <Loader />;

  return (
    <div style={{ background: C.bg, color: C.text, minHeight: '100vh', paddingBottom: 'calc(var(--tab-h) + 24px)', fontFamily: C.font }}>
      {/* Tab bar */}
      <div style={{ padding: '52px 20px 20px', display: 'flex', gap: 8 }}>
        <button style={tabBtn('home')} onClick={() => setActiveTab('home')}>HOME</button>
        <button style={tabBtn('plan')} onClick={() => setActiveTab('plan')}>PLAN</button>
      </div>

      {activeTab === 'home' && (
        <HomeTab
          greeting={greeting}
          profile={profile}
          streak={streak}
          todayDone={todayDone}
          quickRoutines={quickRoutines}
          onNavigate={onNavigate}
          starterCTA={starterCTA}
        />
      )}
      {activeTab === 'plan' && (
        <PlanTab
          sessions={sessions}
          profile={profile}
          onProfileUpdate={async (patch) => {
            if (!dbRef.current) return;
            const previous = profile || {};
            await Promise.all(Object.entries(patch).map(([k,v]) => setProfileField(dbRef.current, k, v)));
            setProfile(prev => ({ ...(prev || {}), ...patch }));
            if (patch.planConfirmed && !previous.planConfirmed) {
              analytics.trackEvent('plan_assigned', { mode: 'manual', selectedPlanId: patch.selectedPlanId || previous.selectedPlanId || selectDefaultPlan(previous) }, { planId: patch.selectedPlanId || previous.selectedPlanId });
            }
          }}
          onNavigate={onNavigate}
        />
      )}
    </div>
  );
}

function RoutinesScreen({ dbRef, onNavigate, params }) {
  const [routines, setRoutines] = useState([]);
  const [ready, setReady] = useState(false);

  const load = () => {
    if (!dbRef.current) return;
    dbGetAll(dbRef.current, 'routines').then(r => {
      setRoutines(r.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0)));
      setReady(true);
    });
  };

  useEffect(load, []);

  const del = async (id, e) => {
    e.stopPropagation();
    if (!confirm('Routine verwijderen?')) return;
    await dbOp(dbRef.current, 'routines', 'readwrite', s => s.delete(id));
    load();
  };

  const [filterCatR, setFilterCatR] = useState((params?.filterCat || 'ALLE').toUpperCase());

  if (!ready) return <Loader />;

  const catFilters = ['ALLE', ...CATS.map(c => c.toUpperCase())];
  const filteredRoutines = filterCatR === 'ALLE'
    ? routines
    : routines.filter(r => {
        const cats = getRoutineCategories(r.exercises).map(c => c.toUpperCase());
        return cats.includes(filterCatR);
      });

  return (
    <div style={{ background: C.bg, color: C.text, minHeight: '100vh', paddingBottom: 'calc(var(--tab-h) + 24px)', fontFamily: C.font }}>

      {/* Header */}
      <header style={{ padding: '44px 20px 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
        <div>
          <div style={{ fontFamily: C.mono, fontSize: 12, letterSpacing: '0.16em', color: C.muted, marginBottom: 8 }}>MIJN</div>
          <h1 style={{ fontSize: 44, fontWeight: 700, letterSpacing: '-0.04em', lineHeight: 0.95 }}>ROUTINES</h1>
        </div>
        <button onClick={() => onNavigate('builder', {})} style={{
          width: 44, height: 44, borderRadius: '50%',
          background: C.accent, color: C.accentFg,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 22, fontWeight: 300, border: 'none', flexShrink: 0,
        }}>+</button>
      </header>

      {/* Filter pills */}
      <div style={{ display: 'flex', gap: 8, padding: '0 20px 20px', overflowX: 'auto', scrollbarWidth: 'none' }}>
        {catFilters.map(c => {
          const active = filterCatR === c;
          return (
            <button key={c} onClick={() => setFilterCatR(c)} style={{
              background: active ? C.accent : 'transparent',
              color: active ? C.accentFg : C.secondary,
              border: `1px solid ${active ? C.accent : C.borderMd}`,
              borderRadius: 999, padding: '7px 14px',
              fontFamily: C.mono, fontSize: 12, letterSpacing: '0.10em', fontWeight: 500,
              whiteSpace: 'nowrap', flexShrink: 0,
            }}>{c}</button>
          );
        })}
      </div>

      {/* Count */}
      <div style={{ padding: '0 20px 12px', fontFamily: C.mono, fontSize: 13, color: C.muted, letterSpacing: '0.08em' }}>
        {filteredRoutines.length} ROUTINE{filteredRoutines.length !== 1 ? 'S' : ''}
      </div>

      {/* List */}
      <div style={{ padding: '0 20px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {filteredRoutines.length === 0 && (
          <div style={{ textAlign: 'center', padding: '60px 0', color: C.muted, fontFamily: C.mono, fontSize: 12, letterSpacing: '0.1em' }}>
            Nog geen routines.
          </div>
        )}
        {filteredRoutines.map(r => (
          <div key={r.id} onClick={() => onNavigate('timer', { routineId: r.id })}
            style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, cursor: 'pointer', overflow: 'hidden' }}>
            <div style={{ padding: '14px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 18, fontWeight: 600, letterSpacing: '-0.01em', marginBottom: 8 }}>{r.name}</div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <CatTags exerciseIds={r.exercises} />
                  <span style={{ fontFamily: C.mono, fontSize: 13, color: C.secondary }}>{r.exercises.length} OEF</span>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginLeft: 12, flexShrink: 0 }}>
                <button onClick={e => { e.stopPropagation(); onNavigate('builder', { routineId: r.id }); }}
                  style={{ background: 'none', border: 'none', color: C.muted, fontSize: 16, padding: '4px 6px' }}>✎</button>

                  style={{ background: 'none', border: 'none', color: C.muted, fontSize: 16, padding: '4px 6px' }}>✕</button>
                <div style={{
                  color: C.accentFg, background: C.accent, borderRadius: 999,
                  width: 32, height: 32, display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}>
                  {Icon.play(12)}

            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function RoutineBuilderScreen({ dbRef, onNavigate, params }) {
  const isEdit = !!params?.routineId;
  const [name, setName] = useState('');
  const [category, setCategory] = useState('Core');
  const [selected, setSelected] = useState([]);
  const [filterCat, setFilterCat] = useState('Core');
  const [quickStart, setQuickStart] = useState(true);
  const [ready, setReady] = useState(!isEdit);
  const [detailEx, setDetailEx] = useState(null);

  useEffect(() => {
    if (!isEdit || !dbRef.current) return;
    dbOp(dbRef.current, 'routines', 'readonly', s => s.get(params.routineId)).then(r => {
      if (r) { setName(r.name); setCategory(r.category); setSelected(r.exercises); setFilterCat(r.category); setQuickStart(r.quickStart !== false); }
      setReady(true);
    });
  }, []);

  const toggleEx = id => setSelected(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

  const save = async () => {
    if (!name.trim() || selected.length === 0) return;
    let createdAt = Date.now();
    if (isEdit) {
      const existing = await dbOp(dbRef.current, 'routines', 'readonly', s => s.get(params.routineId));
      createdAt = existing?.createdAt || createdAt;
    }
    await dbOp(dbRef.current, 'routines', 'readwrite', s => s.put({
      id: params?.routineId || `r-${Date.now()}`,
      name: name.trim(), category, exercises: selected, quickStart, createdAt, updatedAt: Date.now(),
    }));
    onNavigate('routines', {});
  };

  const filtered = EXERCISES.filter(e => e.cat === filterCat);

  if (!ready) return <Loader />;

  return (
    <div style={{ padding: '0 0 100px' }}>
      {/* Header */}
      <div style={{ padding: '14px 20px', display: 'flex', alignItems: 'center', gap: 12, borderBottom: `1px solid ${C.border}`, background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(12px)', position: 'sticky', top: 0, zIndex: 10 }}>
        <button onClick={() => onNavigate('routines', {})} style={{
          width: 36, height: 36, borderRadius: '50%', border: `1px solid ${C.border}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center', color: C.muted, background: 'none',
        }}>{Icon.back(18)}</button>
        <div style={{ fontFamily: C.mono, fontSize: 13, letterSpacing: '0.10em', color: C.text }}>{isEdit ? 'BEWERKEN' : 'NIEUWE ROUTINE'}</div>
      </div>

      <div style={{ padding: '24px 20px' }}>
        {/* Name */}
        <div style={{ marginBottom: 22 }}>
          <Label>NAAM</Label>
          <input value={name} onChange={e => setName(e.target.value)} placeholder="Bijv. Ochtend core..."
            style={{ width: '100%', background: C.surface, border: `1px solid ${C.borderMd}`, color: C.text,
              padding: '12px 14px', fontSize: 13, fontFamily: C.font, outline: 'none', borderRadius: 8 }} />
        </div>

        {/* Category */}
        <div style={{ marginBottom: 24 }}>
          <Label>CATEGORIE</Label>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            {CATS.map(c => (
              <button key={c} onClick={() => setCategory(c)} style={{
                background: category === c ? C.accent : 'transparent',
                color: category === c ? C.accentFg : C.secondary,
                border: `1px solid ${category === c ? C.accent : C.borderMd}`,
                borderRadius: 999, padding: '8px 16px',
                fontFamily: C.mono, fontSize: 11, letterSpacing: '0.10em', fontWeight: 500,
              }}>{c}</button>
            ))}
          </div>
        </div>

        {/* Exercise picker */}
        <div style={{ marginBottom: 24 }}>
          <Label>OEFENINGEN ({selected.length} geselecteerd)</Label>
          {/* Filter */}
          <div style={{ display: 'flex', gap: 6, marginBottom: 12, overflowX: 'auto', paddingBottom: 2 }}>
            {CATS.map(c => (
              <button key={c} onClick={() => setFilterCat(c)} style={{
                background: filterCat === c ? C.elev3 : 'transparent',
                color: filterCat === c ? C.text : C.muted,
                border: `1px solid ${filterCat === c ? C.borderMd : 'transparent'}`,
                borderRadius: 999, padding: '6px 14px',
                fontFamily: C.mono, fontSize: 11, letterSpacing: '0.10em', whiteSpace: 'nowrap',
              }}>{c}</button>
            ))}
          </div>
          {filtered.map(ex => {
            const active = selected.includes(ex.id);
            return (
              <div key={ex.id} onClick={() => toggleEx(ex.id)} style={{
                border: `1px solid ${active ? C.borderMd : C.border}`, borderRadius: 8, padding: '10px 14px', marginBottom: 6,
                cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                opacity: active ? 1 : 0.5, background: active ? C.surface : 'transparent',
              }}>
                <div style={{ flex: 1 }}>
                  <div style={{ color: active ? C.text : C.muted, fontSize: 16, fontWeight: 500 }}>{ex.name}</div>
                  {ex.desc.split('\n').map((line, i) => (
                    <div key={i} style={{ color: i === 0 ? '#C8C8C7' : '#A0A0A0', fontSize: 13, marginTop: i === 0 ? 2 : 1 }}>{line}</div>
                  ))}
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <button onClick={e => { e.stopPropagation(); setDetailEx(ex); }} style={{ background: 'none', border: 'none', color: C.muted, fontSize: 18, padding: '2px 4px', cursor: 'pointer', lineHeight: 1 }}>ⓘ</button>
                  <div style={{ color: active ? (CAT_COLORS[ex.cat] || C.accent) : C.dim, fontSize: 16 }}>{active ? '●' : '○'}</div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Selected order */}
        {selected.length > 0 && (
          <div style={{ marginBottom: 28 }}>
            <Label>VOLGORDE ({selected.length})</Label>
            {selected.map((id, i) => {
              const ex = EXERCISES_WITH_MODE.find(e => e.id === id);
              return (
                <div key={id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 0', borderBottom: `1px solid ${C.dim}` }}>
                  <span style={{ color: C.muted, fontSize: 13, width: 18 }}>{i+1}</span>
                  <span style={{ color: C.text, fontSize: 16, flex: 1 }}>{ex?.name}</span>
                  <span style={{ color: CAT_COLORS[ex?.cat] || C.muted, fontSize: 12, marginRight: 4 }}>■</span>
                  <button onClick={() => setSelected(prev => prev.filter(x => x !== id))}
                    style={{ background: 'none', border: 'none', color: C.muted, cursor: 'pointer', fontSize: 14 }}>✕</button>
                </div>
              );
            })}
          </div>
        )}

        {/* Spiervisualisatie cumulatief */}
        {selected.length > 0 && (() => {
          const exObjs = selected.map(id => EXERCISES_WITH_MODE.find(e => e.id === id)).filter(Boolean);
          const combined = mergeRoutineMuscles(exObjs);
          const hasMuscles = combined.muscles.primary.length > 0 || combined.muscles.secondary.length > 0;
          if (!hasMuscles) return null;
          return (
            <div style={{ border: `1px solid ${C.border}`, padding: '16px 14px', marginBottom: 24 }}>
              <Label>SPIEREN</Label>
              <BodyDiagram exercise={combined} height={220}/>
              <MuscleTags exercise={combined}/>
            </div>
          );
        })()}

        {/* Quick start toggle */}
        <div style={{ marginBottom: 16 }}>
          <Label>HOME SCREEN</Label>
          <button onClick={() => setQuickStart(v => !v)} style={{
            width: '100%', background: 'transparent', cursor: 'pointer',
            border: `1px solid ${quickStart ? C.borderMd : C.border}`, borderRadius: 8,
            color: quickStart ? C.text : C.muted,
            padding: '12px 16px', fontFamily: C.mono, fontSize: 11, letterSpacing: '0.14em',
            display: 'flex', alignItems: 'center', gap: 10,
          }}>
            <span style={{ color: quickStart ? C.accent : C.muted, fontSize: 14 }}>{quickStart ? '■' : '□'}</span>
            TONEN OP SNEL STARTEN
          </button>
        </div>

        <Btn onClick={save} disabled={!name.trim() || selected.length === 0} style={{ width: '100%' }}>
          {isEdit ? 'OPSLAAN' : 'ROUTINE AANMAKEN'}
        </Btn>
      </div>

      {detailEx && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 300, background: C.bg, overflowY: 'auto' }}>
          <ExerciseDetailScreen exercise={detailEx} onBack={() => setDetailEx(null)} dbRef={dbRef} />
        </div>
      )}
    </div>
  );
}

// ================================================================
// TIMER SCREEN
// ================================================================
function TimerScreen({ dbRef, onNavigate, params, analytics }) {
  const [routine, setRoutine] = useState(null);
  const [levelIdx, setLevelIdx] = useState(1);
  const [disabled, setDisabled] = useState(new Set());
  const [phase, setPhase] = useState('idle');
  const [countdown, setCountdown] = useState(3);
  const [stepIdx, setStepIdx] = useState(0);
  const [timeLeft, setTimeLeft] = useState(0);
  const [stepResults, setStepResults] = useState({});
  const [actualInput, setActualInput] = useState('');
  const [soundOn, setSoundOn] = useState(true);
  const [useWakeLock, setUseWakeLock] = useState(true);
  const [startTs, setStartTs] = useState(null);

  useEffect(() => {
    if (!dbRef.current) return;
    getProfile(dbRef.current).then(p => {
      if (p?.sound === false) setSoundOn(false);
      if (p?.wakelock === false) setUseWakeLock(false);
    });
  }, []);
  const intervalRef = useRef(null);
  const audioCtxRef = useRef(null);
  const wakeLockRef = useRef(null);

  useEffect(() => {
    if (params?.routine) { setRoutine(params.routine); return; }
    if (!params?.routineId || !dbRef.current) return;
    dbOp(dbRef.current, 'routines', 'readonly', s => s.get(params.routineId)).then(r => setRoutine(r));
  }, []);

  const exercises = useMemo(() => {
    if (!routine) return [];
    return routine.exercises.map(id => EXERCISES_WITH_MODE.find(e => e.id === id)).filter(Boolean);
  }, [routine]);

  const activeEx = useMemo(() => exercises.filter((_, i) => !disabled.has(i)), [exercises, disabled]);
  const sequence = useMemo(() => buildSequence(activeEx, levelIdx), [activeEx, levelIdx]);
  const totalDur = sequence.reduce((s, e) => s + e.duration, 0);
  const step = sequence[stepIdx];
  const elapsed = sequence.slice(0, stepIdx).reduce((s, e) => s + e.duration, 0) + ((step?.duration || 0) - timeLeft);
  const progress = totalDur > 0 ? Math.min(elapsed / totalDur, 1) : 0;
  const workSteps = sequence.filter(s => !s.isRest);
  const workIdx = sequence.slice(0, stepIdx + 1).filter(s => !s.isRest).length;

  const initAudio = () => { if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)(); };
  const reqWake = async () => { if (!useWakeLock) return; try { if ('wakeLock' in navigator) wakeLockRef.current = await navigator.wakeLock.request('screen'); } catch(e) {} };
  const relWake = () => { try { wakeLockRef.current?.release(); wakeLockRef.current = null; } catch(e) {} };

  useEffect(() => {
    const fn = () => { if (phase === 'running') reqWake(); };
    document.addEventListener('visibilitychange', fn);
    return () => document.removeEventListener('visibilitychange', fn);
  }, [phase]);

  // Countdown
  useEffect(() => {
    if (phase !== 'countdown') return;
    if (countdown <= 0) {
      setPhase('running'); setStepIdx(0); setTimeLeft(sequence[0]?.duration || 0);
      if (soundOn) beep(audioCtxRef.current, 'go');
      return;
    }
    if (soundOn) beep(audioCtxRef.current, 'tick');
    const t = setTimeout(() => setCountdown(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, countdown]);

  // Beep on step change
  useEffect(() => {
    if (phase === 'running' && step && soundOn) beep(audioCtxRef.current, step.isRest ? 'rest' : 'exercise');
  }, [stepIdx]);

  // Main interval
  useEffect(() => {
    if (phase !== 'running') return;
    intervalRef.current = setInterval(() => {
      setTimeLeft(t => {
        if (step && !step.isRest && (step.mode === 'reps' || step.mode === 'hybrid')) return 0;
        if (t <= 1) {
          const next = stepIdx + 1;
          if (next >= sequence.length) {
            const dur = Math.floor((Date.now() - startTs) / 1000);
            clearInterval(intervalRef.current);
            saveSession(dur);
            return 0;
          }
          setStepIdx(next);
          return sequence[next].duration || 0;
        }
        if (t - 1 <= 3 && t - 1 > 0 && soundOn && !step?.isRest) beep(audioCtxRef.current, 'warn');
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(intervalRef.current);
  }, [phase, stepIdx, sequence.length]);

  const saveSession = async dur => {
    if (!dbRef.current || !routine) return;
    const prof = await getProfile(dbRef.current);
    const calories = calcSessionKcal(activeEx, dur, prof?.weight);
    const sessionId = `s-${Date.now()}`;
    const sessionData = {
      id: sessionId, routineId: routine.id, routineName: routine.name,
      levelIdx, duration: dur, exercises: activeEx.map(e => e.name), completedAt: Date.now(),
      mode: activeEx.every(e => e.mode === 'reps') ? 'reps' : (activeEx.every(e => e.mode === 'time') ? 'time' : 'mixed'),
      stepResults,
      setCount: activeEx.length,
      calories,
    };
    if (params?.planId)  sessionData.planId  = params.planId;
    if (params?.planDay) sessionData.planDay = params.planDay;
    await dbOp(dbRef.current, 'sessions', 'readwrite', s => s.put(sessionData));
    await analytics.trackEvent('workout_completed', { routineId: routine.id, duration: dur, exerciseCount: activeEx.length, stepResults }, { sessionId, planId: params?.planId || null });
    relWake();
    onNavigate('finish', { sessionId, routineName: routine.name, levelIdx, duration: dur, exerciseCount: activeEx.length, exercises: activeEx, calories, mode: sessionData.mode, stepResults });
  };

  const startWorkout = () => {
    if (!sequence.length) return;
    initAudio(); reqWake();
    setStartTs(Date.now()); setCountdown(3); setPhase('countdown');
    analytics.trackEvent('workout_started', { routineId: routine.id, mode: 'time' }, { planId: params?.planId || null });
    const workoutMode = activeEx.every(e => e.mode === 'reps') ? 'reps' : (activeEx.every(e => e.mode === 'time') ? 'time' : 'mixed');
    analytics.trackEvent('workout_mode_used', { mode: workoutMode }, { planId: params?.planId || null });
  };

  const reset = () => {
    clearInterval(intervalRef.current); relWake();
    setPhase('idle'); setStepIdx(0); setTimeLeft(0); setCountdown(3);
  };
  const abandonIfNeeded = () => {
    if (phase === 'running' || phase === 'paused' || phase === 'countdown') {
      analytics.trackEvent('workout_abandoned', { routineId: routine?.id, phase }, { planId: params?.planId || null });
    }
  };

  const skip = () => {
    clearInterval(intervalRef.current);
    const next = stepIdx + 1;
    if (next >= sequence.length) {
      const dur = Math.floor((Date.now() - startTs) / 1000);
      saveSession(dur); return;
    }
    setStepIdx(next); setTimeLeft(sequence[next].duration);
  };
  const completeRepStep = () => {
    if (!step || step.isRest || (step.mode !== 'reps' && step.mode !== 'hybrid')) return;
    const actual = Number(actualInput || step.targetReps || 0);
    setStepResults(prev => ({ ...prev, [step.id]: { mode: step.mode, target: step.targetReps || step.duration, actual, completed: actual > 0 } }));
    setActualInput('');
    const next = stepIdx + 1;
    if (next >= sequence.length) {
      const dur = Math.floor((Date.now() - startTs) / 1000);
      saveSession(dur); return;
    }
    setStepIdx(next);
    setTimeLeft(sequence[next].duration || 0);
  };

  const totalMin = Math.floor(totalDur / 60), totalSec = totalDur % 60;
  const circ = 2 * Math.PI * 54;
  const strokeOff = step ? circ * (timeLeft / step.duration) : 0;
  const lvColor = LEVEL_COLORS[levelIdx];

  if (!routine) return <Loader />;

  const doneWorkCount = sequence.slice(0, stepIdx).filter(s => !s.isRest).length;
  const ringColor = step?.isRest ? (step?.isMid ? C.statusWarn : C.statusRest) : C.accent;

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', background: C.bg, color: C.text, fontFamily: C.font }}>

      {/* Fixed header */}
      <div style={{ position: 'fixed', top: 0, left: 0, right: 0, padding: '14px 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(12px)', borderBottom: `1px solid ${C.border}`, zIndex: 10 }}>
        <button onClick={() => { abandonIfNeeded(); reset(); onNavigate(params?.backTo || 'routines', {}); }} style={{
          width: 36, height: 36, borderRadius: '50%', border: `1px solid ${C.border}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center', color: C.muted, background: 'none',
        }}>{Icon.back(18)}</button>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontFamily: C.mono, fontSize: 12, letterSpacing: '0.10em', color: C.secondary }}>{routine.name.toUpperCase()}</div>
          {(phase === 'running' || phase === 'paused') &&
            <div style={{ fontFamily: C.mono, fontSize: 13, color: C.text, marginTop: 2 }}>
              {String(workIdx).padStart(2,'0')} / {String(workSteps.length).padStart(2,'0')}
            </div>
          }
        </div>
        <button onClick={() => { const next = !soundOn; setSoundOn(next); if (dbRef.current) setProfileField(dbRef.current, 'sound', next); }} style={{
          width: 36, height: 36, borderRadius: '50%', border: `1px solid ${C.border}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: C.muted, opacity: soundOn ? 1 : 0.35, background: 'none',
        }}>{soundOn ? Icon.volume(18) : Icon.mute(18)}</button>
      </div>

      {/* IDLE */}
      {phase === 'idle' && (
        <div style={{ padding: '80px 20px 40px', display: 'flex', flexDirection: 'column', gap: 0 }}>
          {/* Level */}
          <div style={{ display: 'flex', gap: 6, marginBottom: 24, justifyContent: 'center' }}>
            {LEVELS.map((lv, i) => (
              <button key={i} onClick={() => setLevelIdx(i)} style={{
                background: i === levelIdx ? LEVEL_COLORS[i] : 'transparent',
                color: i === levelIdx ? C.bg : C.muted,
                border: `1px solid ${i === levelIdx ? LEVEL_COLORS[i] : C.borderMd}`,
                borderRadius: 999, padding: '8px 16px',
                fontFamily: C.mono, fontSize: 12, letterSpacing: '0.12em', fontWeight: 600,
              }}>{lv}</button>
            ))}
          </div>

          {/* Exercise toggles */}
          <div style={{ border: `1px solid ${C.border}`, borderRadius: 12, padding: '6px 16px', marginBottom: 20, background: C.surface }}>
            {exercises.map((ex, i) => {
              const active = !disabled.has(i);
              const toggle = () => setDisabled(prev => { const n = new Set(prev); active ? n.add(i) : n.delete(i); return n; });
              return (
                <div key={ex.id} style={{ display: 'flex', alignItems: 'center', padding: '10px 0', borderBottom: i < exercises.length - 1 ? `1px solid ${C.border}` : 'none', opacity: active ? 1 : 0.35 }}>
                  <span onClick={toggle} style={{ color: active ? (CAT_COLORS[ex.cat] || C.accent) : C.dim, marginRight: 12, fontSize: 12, cursor: 'pointer', userSelect: 'none' }}>●</span>
                  <span onClick={toggle} style={{ flex: 1, color: C.text, fontSize: 17, fontWeight: 500, cursor: 'pointer', userSelect: 'none' }}>{ex.name}</span>
                  <span style={{ fontFamily: C.mono, color: active ? C.muted : C.dim, fontSize: 14, marginRight: 8 }}>
                    {(ex.mode === 'reps' || ex.mode === 'hybrid') ? `${ex.targets?.[['beginner','intermediate','expert'][levelIdx]] || 10} reps` : `${ex.targets?.[['beginner','intermediate','expert'][levelIdx]] || ex.times[levelIdx]}s`}
                  </span>
                  <button onClick={() => onNavigate('exerciseDetail', { exercise: ex, backTo: 'timer', backToParams: params })}
                    style={{ background: 'none', border: 'none', color: C.muted, fontSize: 18, padding: '2px 4px', cursor: 'pointer', lineHeight: 1 }}>ⓘ</button>
                </div>
              );
            })}
          </div>

          <div style={{ fontFamily: C.mono, color: C.secondary, fontSize: 14, letterSpacing: '0.08em', marginBottom: 20, textAlign: 'center' }}>
            {activeEx.length} OEFENINGEN · {totalMin}:{String(totalSec).padStart(2,'0')} MIN
          </div>

          {activeEx.length > 0 && (() => {
            const combined = mergeRoutineMuscles(activeEx);
            const hasMuscles = combined.muscles.primary.length > 0 || combined.muscles.secondary.length > 0;
            if (!hasMuscles) return null;
            return (
              <div style={{ border: `1px solid ${C.border}`, borderRadius: 12, padding: '16px 14px', marginBottom: 24, background: C.surface }}>
                <Label>SPIEREN</Label>
                <BodyDiagram exercise={combined} height={220}/>
                <MuscleTags exercise={combined}/>
              </div>
            );
          })()}

          <Btn onClick={startWorkout} disabled={activeEx.length === 0} style={{ width: '100%' }}>START</Btn>
        </div>
      )}

      {/* COUNTDOWN */}
      {phase === 'countdown' && (
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '80px 20px 40px' }}>
          <div style={{ fontFamily: C.mono, color: C.secondary, fontSize: 14, letterSpacing: '0.3em', marginBottom: 36 }}>KLAAR VOOR START</div>
          <div style={{ fontFamily: C.mono, color: lvColor, fontSize: 110, fontWeight: 600, lineHeight: 1, letterSpacing: '-0.06em' }}>
            {countdown > 0 ? countdown : 'GO'}
          </div>
          {countdown > 0 && <div style={{ fontFamily: C.mono, color: C.secondary, fontSize: 15, marginTop: 24, letterSpacing: '0.1em' }}>{sequence[0]?.name}</div>}
        </div>
      )}

      {/* RUNNING / PAUSED */}
      {(phase === 'running' || phase === 'paused') && step && (
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '74px 20px 0' }}>

          {/* Segmented progress bar */}
          <div style={{ display: 'flex', gap: 4, margin: '14px 0 12px' }}>
            {activeEx.map((_, i) => (
              <div key={i} style={{
                flex: 1, height: 3, borderRadius: 2,
                background: i < doneWorkCount ? C.accent : (i === doneWorkCount && !step.isRest ? `${C.accent}88` : C.border),
              }} />
            ))}
          </div>

          {/* Phase chip */}
          <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 8 }}>
            <span style={{
              display: 'inline-flex', alignItems: 'center', gap: 8,
              fontFamily: C.mono, fontSize: 13, letterSpacing: '0.12em', fontWeight: 600,
              padding: '7px 14px', borderRadius: 999,
              background: step.isRest ? 'rgba(105,166,255,0.10)' : 'rgba(232,254,60,0.08)',
              color: step.isRest ? C.statusRest : C.accent,
              border: `1px solid ${step.isRest ? 'rgba(105,166,255,0.4)' : 'rgba(232,254,60,0.4)'}`,
            }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'currentColor', display: 'inline-block' }} />
              {step.isRest ? 'RUST' : (step.mode === 'reps' ? 'REPS' : 'EXECUTE')}
            </span>
          </div>

          {/* Timer ring */}
          <div style={{ position: 'relative', alignSelf: 'center', margin: '8px 0 16px' }}>
            <svg width="240" height="240" style={{ transform: 'rotate(-90deg)' }}>
              <circle cx="120" cy="120" r="108" fill="none" stroke={C.border} strokeWidth="3" />
              <circle cx="120" cy="120" r="108" fill="none"
                stroke={ringColor}
                strokeWidth="3" strokeLinecap="round"
                strokeDasharray={`${2 * Math.PI * 108}`}
                strokeDashoffset={`${2 * Math.PI * 108 * (1 - (1 - timeLeft / (step?.duration || 1)))}`}
                style={{ transition: 'stroke-dashoffset 0.9s linear' }} />
            </svg>
            <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ fontFamily: C.mono, fontSize: 80, fontWeight: 600, lineHeight: 1, letterSpacing: '-0.06em', color: step.isRest ? ringColor : C.text }}>
                {(step.mode === 'reps' || step.mode === 'hybrid') && !step.isRest ? `${step.targetReps}` : String(timeLeft).padStart(2,'0')}
              </div>
              <div style={{ fontFamily: C.mono, fontSize: 13, color: C.muted, letterSpacing: '0.14em', marginTop: 4 }}>
                {(step.mode === 'reps' || step.mode === 'hybrid') && !step.isRest ? 'REPS' : 'SECONDEN'}
              </div>
            </div>
          </div>

          {/* Exercise name + instruction */}
          <div style={{ textAlign: 'center', padding: '0 8px', marginBottom: 12 }}>
            <div style={{ fontSize: 26, fontWeight: 700, letterSpacing: '-0.02em', marginBottom: 10 }}>
              {step.isRest ? 'RECOVERY' : step.name.toUpperCase()}
            </div>
            <p style={{ fontSize: 15, color: C.secondary, lineHeight: 1.5, margin: '0 auto', maxWidth: 300 }}>
              {step.isRest ? 'Adem diep. Volgende oefening start automatisch.' : ((step.mode === 'reps' || step.mode === 'hybrid') ? `Doe ${step.targetReps} herhalingen en tik op klaar.` : step.desc.split('\n')[0])}
            </p>
            {(step.mode === 'reps' || step.mode === 'hybrid') && !step.isRest && (
              <input value={actualInput} onChange={e => setActualInput(e.target.value.replace(/[^0-9]/g,''))} placeholder="Behaald (optioneel)"
                style={{ width: '100%', marginTop: 12, padding: '10px 12px', borderRadius: 10, border: `1px solid ${C.borderMd}`, background: C.surface, color: C.text, fontFamily: C.mono }} />
            )}

          </div>

          {/* Next up — compact tijdens oefening, prominent tijdens rust */}
          {(() => {
            const next = sequence[stepIdx + 1];
            if (!next || next.isRest) return null;
            if (!step.isRest) return (
              <div style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                margin: '0 0 12px', padding: '12px 14px',
                border: `1px solid ${C.border}`, borderRadius: 12, background: C.surface,
              }}>
                <div>
                  <div style={{ fontFamily: C.mono, fontSize: 12, letterSpacing: '0.08em', color: C.muted, marginBottom: 4 }}>VOLGENDE</div>
                  <div style={{ fontSize: 16, fontWeight: 500 }}>{next.name}</div>
                </div>
                <div style={{ fontFamily: C.mono, fontSize: 15, fontWeight: 500, color: C.accent }}>{next.duration}s</div>
              </div>
            );
            return (
              <div style={{
                margin: '0 0 12px', padding: '16px',
                border: `1px solid ${CAT_COLORS[next.cat] || C.border}`,
                borderRadius: 12, background: C.surface,
              }}>
                <div style={{ fontFamily: C.mono, fontSize: 11, letterSpacing: '0.14em', color: C.muted, marginBottom: 8 }}>VOLGENDE OEFENING</div>
                <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.02em', marginBottom: 10 }}>{next.name}</div>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, color: CAT_COLORS[next.cat] || C.muted, fontSize: 12, letterSpacing: '0.12em', fontFamily: C.mono }}>■ {(next.cat || '').toUpperCase()}</span>
                  <span style={{ fontFamily: C.mono, fontSize: 15, fontWeight: 600, color: C.accent }}>
                    {(next.mode === 'reps' || next.mode === 'hybrid') ? `${next.targetReps} reps` : `${next.target || next.duration}s`}
                  </span>
                </div>
              </div>
            );
          })()}

          {/* Footer */}
          <div style={{ marginTop: 'auto', paddingBottom: 24 }}>
            <div style={{ height: 2, background: C.border, borderRadius: 2, overflow: 'hidden', marginBottom: 8 }}>
              <div style={{ background: C.accent, height: 2, width: `${progress * 100}%`, transition: 'width 1s linear' }} />
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: C.mono, fontSize: 13, color: C.secondary, marginBottom: 14 }}>
              <span>{Math.floor(elapsed/60)}:{String(elapsed%60).padStart(2,'0')}</span>
              <span>{totalMin}:{String(totalSec).padStart(2,'0')}</span>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              {phase === 'running'
                ? <button onClick={() => setPhase('paused')} style={{ padding: '14px 0', border: `1px solid ${C.borderMd}`, borderRadius: 12, fontFamily: C.mono, fontSize: 13, letterSpacing: '0.10em', fontWeight: 600, color: C.text, background: C.surface }}>❚❚  PAUZE</button>
                : <button onClick={() => setPhase('running')} style={{ padding: '14px 0', border: `1px solid ${lvColor}`, borderRadius: 12, fontFamily: C.mono, fontSize: 13, letterSpacing: '0.10em', fontWeight: 600, color: lvColor, background: 'transparent' }}>▶  VERDER</button>
              }
              <button onClick={(step.mode === 'reps' || step.mode === 'hybrid') && !step.isRest ? completeRepStep : skip} style={{ padding: '14px 0', background: C.accent, color: C.accentFg, border: `1px solid ${C.accent}`, borderRadius: 12, fontFamily: C.mono, fontSize: 13, letterSpacing: '0.10em', fontWeight: 600 }}>
                {(step.mode === 'reps' || step.mode === 'hybrid') && !step.isRest ? 'KLAAR ✓' : 'SLA OVER →'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function FinishScreen({ dbRef, onNavigate, params }) {
  const { sessionId, routineName = '', levelIdx = 1, duration = 0, exerciseCount = 0, exercises = [], calories = 0, mode = 'time', stepResults = {}, completedReps = {} } = params || {};
  const [rpe, setRpe] = useState(7);
  const [sessions, setSessions] = useState([]);

  useEffect(() => {
    if (!dbRef.current) return;
    dbGetAll(dbRef.current, 'sessions').then(s => setSessions(s));
  }, []);

  const streak = useMemo(() => calcStreak(sessions), [sessions]);
  const combined = useMemo(() => exercises.length > 0 ? mergeRoutineMuscles(exercises) : { muscles: { primary: [], secondary: [] } }, [exercises]);
  const hasMuscles = combined.muscles.primary.length > 0 || combined.muscles.secondary.length > 0;
  const fmt = s => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
  const heatColors = ['#1A1A1C','#3A3A1A','#76840F','#C2DF1F','#E8FE3C'];
  const heatLabels = ['NIET','LICHT','MEDIUM','HOOG','MAX'];

  const rpeDesc = rpe <= 3 ? 'Lichte inspanning. Kun je nog doorgaan.' :
                  rpe <= 6 ? 'Stevige inspanning. Praten gaat moeilijker.' :
                  rpe <= 8 ? 'Hard. Je voelt de spieren werken.' :
                  'Maximaal. Niets meer over in de tank.';

  return (
    <div style={{ background: C.bg, color: C.text, minHeight: '100vh', fontFamily: C.font, overflowY: 'auto', paddingBottom: 32 }}>

      {/* Top bar */}
      <div style={{ padding: '12px 20px', display: 'flex', justifyContent: 'flex-end' }}>
        <button onClick={() => onNavigate('home', {})} style={{
          width: 36, height: 36, borderRadius: '50%', border: `1px solid ${C.border}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center', color: C.secondary, background: 'none',
        }}>{Icon.close(18)}</button>

      {/* Hero */}

        <h1 style={{ fontSize: 36, fontWeight: 700, letterSpacing: '-0.04em', lineHeight: 1, margin: '0 0 12px' }}>{routineName.toUpperCase()}</h1>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontFamily: C.mono, fontSize: 12, letterSpacing: '0.14em' }}>
          <span style={{ color: C.accent, fontSize: 14 }}>●</span>
          <span>DAG {streak}</span>
          <span style={{ color: C.secondary, marginLeft: 4 }}>· streak verlengd</span>
        </div>

      {/* KPI grid */}

          { num: mode === 'reps' ? `${Object.keys(stepResults || completedReps || {}).length}` : fmt(duration), label: mode === 'reps' ? 'SETS' : 'DUUR', hi: false },
          { num: calories > 0 ? `${calories}` : '—', label: 'CALORIEËN', hi: true },
          { num: `${exerciseCount}`, label: 'VOLTOOID', hi: false },
        ].map(({ num, label, hi }) => (
          <div key={label} style={{
            padding: '16px 12px', border: `1px solid ${hi ? C.accent : C.border}`,
            borderRadius: 12, display: 'flex', flexDirection: 'column', gap: 6,
            background: hi ? 'rgba(232,254,60,0.08)' : C.surface,
          }}>
            <div style={{ fontFamily: C.mono, fontSize: 22, fontWeight: 600, letterSpacing: '-0.03em', lineHeight: 1, color: hi ? C.accent : C.text }}>{num}</div>
            <div style={{ fontFamily: C.mono, fontSize: 12, letterSpacing: '0.08em', color: C.muted }}>{label}</div>
          </div>

      </div>

      {/* Body diagram */}
      {hasMuscles && (
        <section style={{ padding: '24px 0 0' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', padding: '0 20px 12px' }}>
            <span style={{ fontFamily: C.mono, fontSize: 12, letterSpacing: '0.08em', color: C.muted }}>SPIERGROEPEN GETARGET</span>
            <span style={{ fontFamily: C.mono, fontSize: 12, color: C.muted }}>INTENSITEIT</span>
          </div>
          <div style={{ padding: '0 20px 12px', display: 'flex', justifyContent: 'center' }}>

            {heatColors.map((col, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ width: 22, height: 8, borderRadius: 2, background: col }} />
                <span style={{ fontFamily: C.mono, fontSize: 12, letterSpacing: '0.08em', color: C.muted }}>{heatLabels[i]}</span>

function ProfileScreen({ dbRef, onNavigate, analytics }) {
  const [profile, setProfile] = useState(null);
  const [sessions, setSessions] = useState([]);
  const [editing, setEditing] = useState(false);
  const [ready, setReady] = useState(false);
  const [showDebug, setShowDebug] = useState(false);

  const loadAll = async () => {
    if (!dbRef.current) return;
    const [p, s] = await Promise.all([
      getProfile(dbRef.current),
      dbGetAll(dbRef.current, 'sessions'),
    ]);
    setProfile(p);
    setSessions(s);
    setReady(true);
  };

  useEffect(() => { loadAll(); }, []);

  const handleResetOnboarding = async () => {
    if (!dbRef.current) return;
    if (!window.confirm(MSG_RESET_ONBOARDING)) return;
    await setProfileField(dbRef.current, 'onboardingComplete', false);
    onNavigate('onboarding', {});
  };

  const streak   = useMemo(() => calcStreak(sessions), [sessions]);
  const totalKcal = useMemo(() => sessions.reduce((sum, s) => sum + (s.calories ?? s.kcal ?? 0), 0), [sessions]);
  const debugKpis = useMemo(() => computeKpis(analytics.events || []), [analytics.events]);

  if (!ready) return <Loader />;

  const hasName = !!(profile?.name);
  const hasBMI  = !!(profile?.height && profile?.weight);
  const hasGoal = !!(profile?.weightStart && profile?.weightGoal);

  const bmi    = hasBMI ? calcBMI(profile.weight, profile.height) : 0;
  const bmiCat = hasBMI ? bmiCategory(bmi) : null;

  let goalPct = 0, goalReached = false;
  if (hasGoal) {
    const { weightStart, weightGoal, weight } = profile;
    if (weight <= weightGoal) {
      goalReached = true; goalPct = 100;
    } else {
      goalPct = Math.min(100, Math.max(0, Math.round(
        (weightStart - weight) / (weightStart - weightGoal) * 100
      )));
    }
  }

  return (
    <div style={{ background: C.bg, color: C.text, minHeight: '100vh', fontFamily: C.font, paddingBottom: 100 }}>

      {/* Header */}
      <div style={{ padding: '44px 20px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
        <div>
          <div style={{ fontFamily: C.mono, fontSize: 11, letterSpacing: '0.16em', color: C.muted, marginBottom: 8 }}>PROFIEL</div>
          <h1 style={{ fontSize: 38, fontWeight: 700, letterSpacing: '-0.04em', lineHeight: 1 }}>
            {hasName ? profile.name.toUpperCase() : 'STEL PROFIEL IN'}
          </h1>
        </div>
        <button onClick={() => setEditing(true)} style={{
          display: 'flex', alignItems: 'center', gap: 8, padding: '10px 16px', marginTop: 44,
          background: 'transparent', color: C.text, border: `1px solid ${C.border}`,
          borderRadius: 999, fontFamily: C.mono, fontSize: 11, letterSpacing: '0.14em', cursor: 'pointer',
        }}>
          {Icon.edit(14)}
          <span>BEWERK</span>
        </button>
      </div>

      {/* Stat tiles — altijd zichtbaar */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 8, padding: '24px 20px 0' }}>
        <StatTile num={streak} label="DAG STREAK" />
        <StatTile num={sessions.length} label="SESSIES" />
        <StatTile num={totalKcal >= 1000 ? `${(totalKcal/1000).toFixed(1)}k` : totalKcal} label="CAL TOTAAL" />
      </div>

      {/* CTA als profiel leeg */}
      {!hasName && (
        <div style={{ padding: '24px 20px 0' }}>
          <div style={{ border: `1px solid ${C.border}`, borderRadius: 12, padding: '24px 20px', background: C.surface, textAlign: 'center' }}>
            <div style={{ fontWeight: 600, fontSize: 17, marginBottom: 8 }}>Stel je profiel in</div>
            <div style={{ color: C.secondary, marginBottom: 20, lineHeight: 1.6, fontSize: 14 }}>
              Voor BMI, gewichtsdoel en calorieën
            </div>
            <button onClick={() => setEditing(true)} style={{
              padding: '14px 24px', background: C.accent, color: C.accentFg, border: 'none', borderRadius: 12,
              fontFamily: C.mono, fontSize: 13, letterSpacing: '0.16em', fontWeight: 600, cursor: 'pointer',
            }}>BEGIN</button>
          </div>
        </div>
      )}

      {/* BMI — alleen als lengte + gewicht ingevuld */}
      {hasBMI && (
        <section style={{ padding: '32px 20px 0' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 12 }}>
            <span style={{ fontFamily: C.mono, fontSize: 11, letterSpacing: '0.10em', color: C.muted }}>BMI</span>
            <span style={{ fontFamily: C.mono, fontSize: 11, letterSpacing: '0.10em', color: bmiCat.label === 'GEZOND' ? C.accent : C.text }}>{bmiCat.label}</span>
          </div>
          <div style={{ border: `1px solid ${C.border}`, borderRadius: 12, padding: 20, background: C.surface }}>
            <div style={{ fontSize: 48, fontWeight: 700, letterSpacing: '-0.04em', lineHeight: 1, marginBottom: 16, fontFamily: C.mono }}>
              {bmi.toFixed(1)}
            </div>
            <div style={{ position: 'relative', height: 10, borderRadius: 4, overflow: 'hidden', display: 'flex' }}>
              <div style={{ flex: 18.5, background: '#69A6FF' }} />
              <div style={{ flex: 6.5,  background: '#E8FE3C' }} />
              <div style={{ flex: 5,    background: '#FFB454' }} />
              <div style={{ flex: 10,   background: '#FF5A5A' }} />
              <div style={{
                position: 'absolute', top: -3, height: 16, width: 3, background: '#fff', borderRadius: 2,
                left: `${Math.min(100, (Math.min(bmi, 40) / 40) * 100)}%`, transform: 'translateX(-1.5px)',
              }} />
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8, fontFamily: C.mono, fontSize: 12, color: C.muted, letterSpacing: '0.06em' }}>
              <span>0</span><span>18.5</span><span>25</span><span>30</span><span>40</span>
            </div>
          </div>
        </section>

        <section style={{ padding: '24px 20px 0' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 12 }}>
            <span style={{ fontFamily: C.mono, fontSize: 11, letterSpacing: '0.10em', color: C.muted }}>GEWICHTSDOEL</span>
            <span style={{ fontFamily: C.mono, fontSize: 11, letterSpacing: '0.10em', color: goalReached ? C.statusGo : C.accent }}>
              {goalReached ? 'DOEL BEREIKT 🎯' : `${goalPct}%`}
            </span>
          </div>
          <div style={{ border: `1px solid ${C.border}`, borderRadius: 12, padding: 20, background: C.surface }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginBottom: 18 }}>

              <GoalCol label="NU"    value={`${profile.weight}kg`} highlight />
              <GoalCol label="DOEL"  value={`${profile.weightGoal}kg`} align="right" />
            </div>
            <div style={{ position: 'relative', height: 6, background: C.elev3, borderRadius: 3, marginBottom: 12 }}>
              <div style={{ position: 'absolute', left: 0, top: 0, height: '100%', width: `${goalPct}%`, background: C.accent, borderRadius: 3 }} />
              <div style={{ position: 'absolute', top: -3, left: `${goalPct}%`, width: 12, height: 12, borderRadius: '50%', background: C.accent, transform: 'translateX(-6px)' }} />
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: C.mono, fontSize: 11, letterSpacing: '0.06em' }}>
              <span style={{ color: C.statusGo }}>
                -{(profile.weightStart - profile.weight).toFixed(1)} kg afgevallen
              </span>
              <span style={{ color: C.muted }}>
                {Math.max(0, profile.weight - profile.weightGoal).toFixed(1)} kg te gaan
              </span>
            </div>
          </div>
        </section>
      )}

      {/* Persoonlijk — altijd zichtbaar */}
      <section style={{ padding: '32px 20px 0' }}>
          <div style={{ fontFamily: C.mono, fontSize: 12, letterSpacing: '0.16em', color: C.muted, marginBottom: 12 }}>PERSOONLIJK</div>
          <div style={{ border: `1px solid ${C.border}`, borderRadius: 12, background: C.surface, overflow: 'hidden' }}>
            <PersonalRow label="LEEFTIJD" value={profile?.age    ? `${profile.age} jaar`      : '—'} />
            <PersonalRow label="GESLACHT" value={profile?.gender ? profile.gender.toUpperCase() : '—'} />
            <PersonalRow label="LENGTE"   value={profile?.height ? `${profile.height} cm` : '—'} />
            <PersonalRow label="GEWICHT"  value={profile?.weight ? `${profile.weight} kg` : '—'} last />
          </div>
        </section>
      {/* Sessiegeschiedenis */}
      <section style={{ padding: '32px 20px 0' }}>
        <div style={{ fontFamily: C.mono, fontSize: 12, letterSpacing: '0.16em', color: C.muted, marginBottom: 12 }}>RECENTE SESSIES</div>
        {sessions.length === 0 ? (
          <div style={{ textAlign: 'center', padding: '24px 0', fontFamily: C.mono, color: C.muted, fontSize: 12, letterSpacing: '0.1em' }}>Nog geen sessies afgerond.</div>
        ) : (
          <div style={{ border: `1px solid ${C.border}`, borderRadius: 12, background: C.surface, overflow: 'hidden' }}>
            {sessions
              .sort((a, b) => b.completedAt - a.completedAt)
              .slice(0, 5)
              .map((s, i, arr) => (
              <div key={s.id} style={{ padding: '14px 16px', borderBottom: i < arr.length - 1 ? `1px solid ${C.border}` : 'none', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                <div>
                  <div style={{ fontSize: 16, fontWeight: 500, marginBottom: 3 }}>{s.routineName}</div>
                  <div style={{ fontFamily: C.mono, color: C.secondary, fontSize: 12, letterSpacing: '0.06em' }}>
                    {LEVELS[s.levelIdx]} · {s.exercises?.length || 0} OEF · {Math.floor(s.duration / 60)}:{String(s.duration % 60).padStart(2, '0')} MIN
                  </div>
                </div>
                <div style={{ fontFamily: C.mono, color: C.muted, fontSize: 11, textAlign: 'right', flexShrink: 0, marginLeft: 12 }}>
                  {new Date(s.completedAt).toLocaleDateString('nl-NL', { weekday: 'short', day: 'numeric', month: 'short' })}
                </div>
              </div>
            ))}
          </div>
        )}
      </section>

      {editing && <ProfileEditModal profile={profile} onSave={async p => {
        await saveProfile(dbRef.current, { ...(profile || {}), ...p, createdAt: profile?.createdAt || Date.now() });
        setEditing(false);
        loadAll();
      }} onClose={() => setEditing(false)} />}
    </div>
  );
}
