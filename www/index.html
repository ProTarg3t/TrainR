  <style>

      --heat-2: #76840F;
      --heat-3: #C2DF1F;

    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #000; color: #FAFAF9; font-family: var(--font-sans); overscroll-behavior: none; -webkit-font-smoothing: antialiased; }
    button { cursor: pointer; }
    input { -webkit-appearance: none; border-radius: 0; }

    .rpe-slider { position: absolute; inset: -10px 0; width: 100%; opacity: 0; cursor: pointer; -webkit-appearance: none; }

    /* ── HOME (nieuwe design) ── */
    .hm-head { padding: 28px var(--pad) 8px; }
    .hm-eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.12em; color: var(--fg-secondary); text-transform: uppercase; }

    .hm-lbl { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; color: var(--fg-secondary); font-weight: 500; text-transform: uppercase; }
    .hm-tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 var(--pad); }

    .hm-wcell { aspect-ratio: 1 / 1.4; border-radius: var(--radius-sm); background: var(--bg-elev-1); display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 8px 0; }

    .hm-hscroll::-webkit-scrollbar { display: none; }
    .qc { flex: 0 0 200px; scroll-snap-align: start; background: var(--bg-elev-1); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 14px; display: flex; flex-direction: column; gap: 10px; text-align: left; transition: border-color var(--dur-fast) var(--ease-out), background var(--dur-fast) var(--ease-out); color: var(--fg-primary); cursor: pointer; }

    .qc-unit { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); letter-spacing: 0.10em; font-weight: 500; }
    .qc-sep { color: var(--fg-quaternary); margin: 0 2px; }

    .hm-rows { display: flex; flex-direction: column; padding: 0 var(--pad); }
    .rr { display: grid; grid-template-columns: 1fr auto auto; gap: 14px; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border-subtle); background: transparent; text-align: left; color: var(--fg-primary); cursor: pointer; border-left: 0; border-right: 0; border-top: 0; }
    .rr:last-child { border-bottom: none; }
    .rr-left { min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .rr-name { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; color: var(--fg-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rr-meta { display: flex; gap: 8px; align-items: center; }
    .rr-dur { font-family: var(--font-mono); font-size: 12px; color: var(--fg-secondary); font-weight: 500; letter-spacing: 0.04em; font-variant-numeric: tabular-nums; }
    .rr-play { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid var(--signal); background: var(--signal-08); color: var(--signal); flex-shrink: 0; transition: background var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out); }
    .rr:active .rr-play { background: var(--signal); color: var(--signal-fg); }
    .tg { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; color: var(--fg-secondary); text-transform: uppercase; }
    .tg::before { content: ''; width: 7px; height: 7px; border-radius: 1px; background: currentColor; }

    .hm-tinybtn:active { color: var(--signal); border-color: var(--signal); }
    .hm-chips { display: flex; gap: 8px; padding: 0 var(--pad); overflow-x: auto; scrollbar-width: none; }
    .hm-chips::-webkit-scrollbar { display: none; }
    .hm-chip { flex-shrink: 0; padding: 9px 16px; border-radius: var(--radius-pill); border: 1px solid var(--border-default); background: transparent; color: var(--fg-secondary); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.10em; font-weight: 600; cursor: pointer; transition: all var(--dur-fast) var(--ease-out); white-space: nowrap; text-transform: uppercase; }

</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ================================================================
// DB LAYER
// ================================================================
const VERSION = '0.3';
const DB_NAME = 'trainr_v1';
const DB_VERSION = 5;
const DEV_MODE = ['localhost', '127.0.0.1'].includes(window.location.hostname);

// UI-strings die op meerdere plekken voorkomen
const MSG_RESET_ONBOARDING = 'Restart onboarding? Your profile will be kept.';

const initDB = () => new Promise((resolve, reject) => {
  const req = indexedDB.open(DB_NAME, DB_VERSION);
  req.onupgradeneeded = e => {
    const db = e.target.result;
    const old = e.oldVersion;

    if (!db.objectStoreNames.contains('routines')) db.createObjectStore('routines', { keyPath: 'id' });
    if (!db.objectStoreNames.contains('sessions')) db.createObjectStore('sessions', { keyPath: 'id' });

    // v4: profile store omgebouwd naar KV-schema { key, value }
    if (old < 4) {
      if (db.objectStoreNames.contains('profile')) db.deleteObjectStore('profile');
      db.createObjectStore('profile', { keyPath: 'key' });
    } else if (!db.objectStoreNames.contains('profile')) {
      db.createObjectStore('profile', { keyPath: 'key' });
    }
    if (!db.objectStoreNames.contains('events')) db.createObjectStore('events', { keyPath: 'id' });
  };
  req.onsuccess = e => resolve(e.target.result);
  req.onerror = e => reject(e.target.error);
});

// Profile helpers — KV store: { key, value } per record
// Normaliseert oude profielen: vroege builds hadden `goal` (fitness/core_strength/fat_loss)
// naast `trainingGoal` (core/fatloss/muscle). trainingGoal is nu canonical.
function migrateProfile(p) {
  if (!p) return p;
  if (!p.trainingGoal && p.goal) {
    p.trainingGoal = { fat_loss: 'fatloss', core_strength: 'core', fitness: 'fitness' }[p.goal] || 'fitness';
  }
  return p;
}

const getProfile = async db => {
  const entries = await dbGetAll(db, 'profile');
  if (!entries.length) return null;
  return migrateProfile(Object.fromEntries(entries.map(e => [e.key, e.value])));
};
const setProfileField = (db, key, value) =>
  dbOp(db, 'profile', 'readwrite', s => s.put({ key, value }));
const saveProfile = async (db, profile) => {
  const FIELDS = [
    'name', 'age', 'gender', 'height', 'weight', 'weightStart', 'weightGoal',
    'level', 'trainingGoal', 'availableDays',
    'selectedPlanId', 'planConfirmed', 'starterPlanProfile', 'starterPlanSelection',
    'onboardingComplete', 'createdAt',
    'notificationsEnabled', 'notificationDays', 'notificationTime', 'notificationPermissionState', 'lastReminderAt', 'lastFollowupAt',
  ];
  await Promise.all(
    FIELDS
      .filter(k => profile[k] !== undefined && profile[k] !== null)
      .map(k => setProfileField(db, k, profile[k]))
  );
  await setProfileField(db, 'updatedAt', Date.now());
};

const SAFE_STARTER_PROFILE = 'core_beginner_3d';
function resolveStarterPlanProfile({ level, trainingGoal, availableDays }) {
  const validDays = Number.isInteger(availableDays) && availableDays > 0;
  if (!level || !trainingGoal || !validDays) {
    return {
      profileId: SAFE_STARTER_PROFILE,
      fallbackReason: 'missing_or_inconsistent_onboarding_data',
      routineId: DEFAULT_ROUTINE.id,
    };
  }

  const daysBucket = availableDays >= 4 ? '4d' : '3d';
  let goalKey = 'core';
  if (trainingGoal === 'fatloss') goalKey = 'fatloss';
  if (trainingGoal === 'muscle') goalKey = 'muscle';
  const levelKey = level === 'beginner' ? 'beginner' : 'starter';
  const profileId = `${goalKey}_${levelKey}_${daysBucket}`;
  return { profileId, fallbackReason: null, routineId: DEFAULT_ROUTINE.id };
}

// MET-waarden per categorie (Compendium of Physical Activities)
const MET_BY_CAT = { Core: 4.0, Arms: 5.0, Legs: 5.5, 'Full Body': 8.0 };
const MET_REST = 1.5;
const MET_SESSION = { Core: 3.5, Arms: 4.0, Legs: 5.0, 'Full Body': 7.0 };

function calcSessionKcal(exercises, durationSec, weightKg) {
  if (!weightKg || !durationSec || !exercises?.length) return 0;
  const counts = {};
  exercises.forEach(ex => { counts[ex.cat] = (counts[ex.cat] || 0) + 1; });
  let dom = exercises[0].cat, max = 0;
  const seen = new Set();
  for (const ex of exercises) {
    if (seen.has(ex.cat)) continue;
    seen.add(ex.cat);
    if (counts[ex.cat] > max) { max = counts[ex.cat]; dom = ex.cat; }
  }
  return Math.round((MET_SESSION[dom] || 4.0) * weightKg * (durationSec / 3600));
}

// Calorieën voor een lijst oefeningen + duur (seconden) bij gegeven gewicht
// Verdeling: ~70% van duur = oefening (gemiddelde MET van categorieën), ~30% rust
function calcCalories(exercises, durationSec, weightKg) {
  if (!weightKg || !durationSec || !exercises?.length) return 0;
  const avgMet = exercises.reduce((sum, ex) => sum + (MET_BY_CAT[ex.category] || 5.0), 0) / exercises.length;
  const exerciseHours = (durationSec * 0.7) / 3600;
  const restHours = (durationSec * 0.3) / 3600;
  return Math.round(avgMet * weightKg * exerciseHours + MET_REST * weightKg * restHours);
}

// BMI helpers
function calcBMI(weightKg, heightCm) {
  if (!weightKg || !heightCm) return 0;
  const m = heightCm / 100;
  return weightKg / (m * m);
}
function bmiCategory(bmi) {
  if (bmi < 18.5) return { label: 'UNDERWEIGHT', color: '#69A6FF' };
  if (bmi < 25)   return { label: 'HEALTHY',     color: '#6BE89B' };
  if (bmi < 30)   return { label: 'OVERWEIGHT',  color: '#FFB454' };
  return            { label: 'OBESE',           color: '#FF5A5A' };
}

const dbOp = (db, store, mode, fn) => new Promise((resolve, reject) => {
  const tx = db.transaction(store, mode);
  const req = fn(tx.objectStore(store));
  req.onsuccess = e => resolve(e.target.result);
  req.onerror = e => reject(e.target.error);
});

const dbGetAll = (db, store) => new Promise((resolve, reject) => {
  const tx = db.transaction(store, 'readonly');
  const req = tx.objectStore(store).getAll();
  req.onsuccess = e => resolve(e.target.result || []);
  req.onerror = e => reject(e.target.error);
});

function getUserId(profile) {
  return profile?.createdAt ? `u-${profile.createdAt}` : 'u-anon';
}
function getSessionId() {
  if (!window.__trainrSessionId) window.__trainrSessionId = `sess-${Date.now()}`;
  return window.__trainrSessionId;
}
async function storeEventRecord(db, record) {
  await dbOp(db, 'events', 'readwrite', s => s.put(record));
}
function trackEventFactory(dbRef) {
  return async (name, meta = {}, opts = {}) => {
    const profile = dbRef.current ? await getProfile(dbRef.current) : null;
    const evt = {
      id: `evt-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
      event: name,
      ts: Date.now(),
      userId: getUserId(profile),
      sessionId: opts.sessionId || getSessionId(),
      planId: opts.planId || null,
      meta: typeof meta === 'object' && meta !== null ? meta : { value: meta },
    };
    try {
      if (dbRef.current) await storeEventRecord(dbRef.current, evt);
      else throw new Error('db_not_ready');
    } catch (err) {
      const key = 'trainr_events_fallback';
      const prev = JSON.parse(localStorage.getItem(key) || '[]');
      prev.push(evt);
      localStorage.setItem(key, JSON.stringify(prev));
      console.warn('[analytics] IndexedDB write failed, used localStorage fallback.', err?.message || err);
    }
    return evt;
  };
}
async function loadAllEvents(db) {
  const idbEvents = db ? await dbGetAll(db, 'events') : [];
  const fallback = JSON.parse(localStorage.getItem('trainr_events_fallback') || '[]');
  return [...idbEvents, ...fallback].sort((a, b) => a.ts - b.ts);
}
function computeKpis(events) {
  const byUser = new Map();
  events.forEach(e => {
    if (!byUser.has(e.userId)) byUser.set(e.userId, []);
    byUser.get(e.userId).push(e);
  });
  let onboarded = 0, activated = 0, d7Users = 0, activeUsers = 0, weekWorkouts = 0;
  for (const [, ue] of byUser) {
    const ob = ue.find(e => e.event === 'onboarding_completed');
    const wc = ue.filter(e => e.event === 'workout_completed');
    if (ob) {
      onboarded += 1;
      if (wc.some(w => w.ts >= ob.ts && w.ts <= ob.ts + 24 * 3600 * 1000)) activated += 1;
      const d7s = new Date(ob.ts + 7 * 24 * 3600 * 1000).toDateString();
      if (ue.some(e => new Date(e.ts).toDateString() === d7s)) d7Users += 1;
    }
    const weekAgo = Date.now() - 7 * 24 * 3600 * 1000;
    const hasWeekActivity = ue.some(e => e.ts >= weekAgo);
    if (hasWeekActivity) activeUsers += 1;
    weekWorkouts += wc.filter(w => w.ts >= weekAgo).length;
  }
  return {
    events7d: events.filter(e => e.ts >= Date.now() - 7 * 24 * 3600 * 1000).length,
    activation24h: onboarded ? activated / onboarded : 0,
    d7Retention: onboarded ? d7Users / onboarded : 0,
    d7ByUser: Object.fromEntries([...byUser.keys()].map(userId => {
      const ue = byUser.get(userId);
      const ob = ue.find(e => e.event === 'onboarding_completed');
      const d7 = ob ? ue.some(e => new Date(e.ts).toDateString() === new Date(ob.ts + 7 * 24 * 3600 * 1000).toDateString()) : false;
      return [userId, d7];
    })),
    workoutsPerActiveUserWeek: activeUsers ? weekWorkouts / activeUsers : 0,
  };
}

// ================================================================
// SPIERVISUALISATIE — config, helpers, SVG, componenten
// ================================================================

const MUSCLE_COLORS = {
  none:      { fill: '#1A1A1C', stroke: '#252528' },
  secondary: { fill: '#3A3A1A', stroke: '#76840F' },
  primary:   { fill: '#C2DF1F', stroke: '#E8FE3C' },
};

const MUSCLE_CONFIG = {
  chest:       { view: 'front', label: 'Chest'       },
  shoulders:   { view: 'both',  label: 'Shoulders'   },
  biceps:      { view: 'front', label: 'Biceps'      },
  triceps:     { view: 'back',  label: 'Triceps'     },
  forearms:    { view: 'both',  label: 'Forearms'    },
  abs:         { view: 'front', label: 'Abs'         },
  obliques:    { view: 'front', label: 'Obliques'    },
  hip_flexors: { view: 'front', label: 'Hip flexors' },
  traps:       { view: 'back',  label: 'Trapezius'   },
  lats:        { view: 'back',  label: 'Lats'        },
  lower_back:  { view: 'back',  label: 'Lower back'  },
  glutes:      { view: 'back',  label: 'Glutes'      },
  quads:       { view: 'front', label: 'Quadriceps'  },
  hamstrings:  { view: 'back',  label: 'Hamstrings'  },
  calves:      { view: 'both',  label: 'Calves'      },
};

function buildHighlighted(ex) {
  const h = {};
  (ex.muscles?.secondary || []).forEach(m => { h[m] = 'secondary'; });
  (ex.muscles?.primary   || []).forEach(m => { h[m] = 'primary';   });
  return h;
}
function detectViews(h) {
  let f = false, b = false;
  for (const m of Object.keys(h)) {
    const v = MUSCLE_CONFIG[m]?.view;
    if (v === 'front' || v === 'both') f = true;
    if (v === 'back'  || v === 'both') b = true;
  }
  if (f && b) return 'both';
  return b ? 'back' : 'front';
}
function zoneStyle(name, h) {
  const lvl = h[name] || 'none';
  return { fill: MUSCLE_COLORS[lvl].fill, stroke: MUSCLE_COLORS[lvl].stroke, strokeWidth: 0.6 };
}
function mergeRoutineMuscles(exercises) {
  const prim = new Set(), sec = new Set();
  exercises.forEach(ex => {
    (ex.muscles?.primary   || []).forEach(m => prim.add(m));
    (ex.muscles?.secondary || []).forEach(m => sec.add(m));
  });
  prim.forEach(m => sec.delete(m));
  return { name: 'Routine', muscles: { primary: [...prim], secondary: [...sec] } };
}
function pickStroke(level) {
  if (level === 'primary')   return '#E8FE3C';
  if (level === 'secondary') return '#76840F';
  return '#2a2a2d';

function BodyDiagram({ exercise, height = 260 }) {
  const h     = React.useMemo(() => buildHighlighted(exercise), [exercise]);
  const views = detectViews(h);
  const both  = views === 'both';
  const figW  = height * (100 / 244);
  const lbl   = { textAlign: 'center', fontSize: 12, letterSpacing: 2, color: C.muted, marginBottom: 4, fontFamily: 'var(--font-mono)' };
  return (
    <div style={{ display: 'flex', gap: 14, justifyContent: 'center', alignItems: 'flex-start' }}>
      {(views === 'front' || both) && (
        <div style={{ width: figW, flexShrink: 0 }}>
          <div style={lbl}>FRONT</div>
          <div style={{ height }}><FrontBody h={h}/></div>
        </div>
      )}
      {(views === 'back' || both) && (
        <div style={{ width: figW, flexShrink: 0 }}>
          <div style={lbl}>BACK</div>
          <div style={{ height }}><BackBody h={h}/></div>
        </div>
      )}
    </div>
  );
}

function MuscleTags({ exercise }) {
  const { primary = [], secondary = [] } = exercise.muscles || {};
  const tag = (m, level) => (
    <span key={m} style={{
      display: 'inline-block', padding: '3px 8px', borderRadius: 4,
      background: level === 'primary' ? 'rgba(232,254,60,0.12)' : 'rgba(255,255,255,0.06)',
      color:      level === 'primary' ? '#E8FE3C' : C.muted,
      fontFamily: 'var(--font-mono)', fontSize: 12, letterSpacing: '0.08em',
      marginRight: 5, marginBottom: 4,
    }}>{MUSCLE_CONFIG[m]?.label || m}</span>
  );
  return (
    <div style={{ marginTop: 12, paddingTop: 12, borderTop: '1px solid rgba(255,255,255,0.06)' }}>
      {primary.length > 0 && (
        <div style={{ marginBottom: 8 }}>
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: C.muted, letterSpacing: '0.12em', marginBottom: 5 }}>PRIMARY</div>
          <div>{primary.map(m => tag(m, 'primary'))}</div>
        </div>
      )}
      {secondary.length > 0 && (
        <div>
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: C.muted, letterSpacing: '0.12em', marginBottom: 5 }}>SECONDARY</div>
          <div>{secondary.map(m => tag(m, 'secondary'))}</div>
        </div>
      )}
    </div>
  );
}

const CAT_COLORS = { Core: '#E8FE3C', Arms: '#FFB454', Legs: '#6BE89B', 'Full Body': '#FF5A5A' };

function getRoutineCategories(exerciseIds) {
  const seen = new Set();
  const cats = [];
  exerciseIds.forEach(id => {
    const ex = EXERCISES_WITH_MODE.find(e => e.id === id);
    if (ex && !seen.has(ex.cat)) { seen.add(ex.cat); cats.push(ex.cat); }
  });
  return cats;
}

function CatTags({ exerciseIds, count }) {
  const cats = getRoutineCategories(exerciseIds);
  return (
    <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
      {cats.map(cat => (
        <span key={cat} style={{ display: 'inline-flex', alignItems: 'center', gap: 3, color: CAT_COLORS[cat], fontSize: 12, letterSpacing: '0.12em' }}>
          ■ {cat.toUpperCase()}
        </span>
      ))}
      {count != null && <span style={{ color: C.muted, fontSize: 12 }}>· {count} EX</span>}
    </div>
  );
}

// Dag-van-jaar (1-366). Gebruikt als seed voor dagelijkse coach-selectie.
function dayOfYear(d = new Date()) {
  const start = new Date(d.getFullYear(), 0, 0);
  return Math.floor((d - start) / 86400000);
}

// 32-bit hash voor strings (Mulberry-style); kleine, snel, deterministisch.
function hashStr(s) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}

// Pure deterministische shuffle: zelfde seed = zelfde volgorde.
function seededShuffle(arr, seed) {
  const out = arr.slice();
  let s = seed >>> 0;
  for (let i = out.length - 1; i > 0; i--) {
    s = (Math.imul(s, 1664525) + 1013904223) >>> 0;
    const j = s % (i + 1);
    [out[i], out[j]] = [out[j], out[i]];
  }
  return out;
}

// Bouwt 3 gepersonaliseerde workouts op basis van profile + dag-van-jaar.
// Retourneert objecten met dezelfde vorm als BODY_PART_WORKOUTS-items.
function buildCoachWorkouts(profile) {
  const goal     = profile?.trainingGoal || 'fitness';
  const level    = profile?.level || 'intermediate';
  const timeIdx  = LEVEL_TIME_IDX[level] ?? 1;
  const age      = parseInt(profile?.age, 10) || 0;
  const weight   = parseFloat(profile?.weight) || 0;
  const wGoal    = parseFloat(profile?.weightGoal) || 0;
  const wDelta   = weight - wGoal;
  const templates = COACH_TEMPLATES[goal] || COACH_TEMPLATES.fitness;
  const today    = dayOfYear();
  const baseSeed = hashStr(`${goal}|${level}|${today}`);

  return templates.map((t, idx) => {
    let primaryCount = Math.ceil(t.count * 0.7);
    let secondaryCount = t.count - primaryCount;

    // WeightDelta-tweak: bij echt afvallen meer Full Body in fatloss-templates.
    if (goal === 'fatloss' && wDelta > 5 && t.primaryCat === 'Full Body' && secondaryCount > 1) {
      primaryCount += 1;
      secondaryCount -= 1;
    }

    const inPool = (e, cat) => e.cat === cat && !(age >= 55 && HIGH_IMPACT_IDS.has(e.id));
    const primaryPool   = EXERCISES.filter(e => inPool(e, t.primaryCat));
    const secondaryPool = t.secondaryCat ? EXERCISES.filter(e => inPool(e, t.secondaryCat)) : [];

    const seed = baseSeed ^ hashStr(t.id);
    const primary   = seededShuffle(primaryPool,   seed).slice(0, primaryCount);
    const secondary = seededShuffle(secondaryPool, seed ^ 0x9E3779B9).slice(0, secondaryCount);

    // Als secundaire pool te klein was, primair aanvullen.
    if (secondary.length < secondaryCount) {
      const need = secondaryCount - secondary.length;
      const extra = seededShuffle(primaryPool.filter(e => !primary.includes(e)), seed + 7).slice(0, need);
      primary.push(...extra);
    }

    const picked = [...primary, ...secondary];
    const totalSec = picked.reduce((sum, e) => sum + (e.times?.[timeIdx] || 30), 0) + (picked.length - 1) * 30;
    const minutes = Math.max(1, Math.round(totalSec / 60));

    return {
      id: `coach-${goal}-${t.id}-${today}`,
      name: t.name,
      durationLabel: `${minutes}M`,
      exercises: picked.map(e => e.id),
      category: t.primaryCat,
    };
  });
}

function selectDefaultPlan(profile) {
  if (!profile) return BUILTIN_PLANS[0].id;
  // trainingGoal is canonical; oude profielen vallen via migrateProfile al om.
  // Inline-fallback voor het pad in OnboardingScreen waar nog geen migratie heeft plaatsgevonden.
  const tg = profile.trainingGoal
    || ({ fat_loss: 'fatloss', core_strength: 'core', fitness: 'fitness' }[profile.goal])
    || ((profile.weightGoal && profile.weight && profile.weightGoal < profile.weight) ? 'fatloss' : 'fitness');
  if (tg === 'core') return 'core-30';
  if (profile.level === 'beginner') return 'consistency-21';
  return 'fit-28';
}

function isPlanDayUnlocked(plan, dayNumber, sessions) {
  if (dayNumber === 1) return true;
  const prevDay = plan.days.find(d => d.day === dayNumber - 1);
  if (!prevDay) return false;
  if (prevDay.restDay) return isPlanDayUnlocked(plan, dayNumber - 1, sessions);
  return sessions.some(s => s.planId === plan.id && s.planDay === dayNumber - 1);
}

function isPlanDayCompleted(plan, dayNumber, sessions) {
  const day = plan.days.find(d => d.day === dayNumber);
  if (!day) return false;
  if (day.restDay) {
    const nextDay = plan.days.find(d => d.day === dayNumber + 1);
    if (!nextDay) return true;
    return isPlanDayUnlocked(plan, dayNumber + 1, sessions);
  }
  return sessions.some(s => s.planId === plan.id && s.planDay === dayNumber);
}

function beep(ctx, type = 'tick') {
  if (!ctx) return;
  try {
    const cues = {
      tick:     [{ f: 440,  t: 0,    d: 0.08, g: 0.30, w: 'sine'   }],
      go:       [{ f: 660,  t: 0,    d: 0.10, g: 0.40, w: 'square' },
                 { f: 880,  t: 0.13, d: 0.10, g: 0.40, w: 'square' },
                 { f: 1100, t: 0.26, d: 0.18, g: 0.50, w: 'square' }],
      exercise: [{ f: 880,  t: 0,    d: 0.10, g: 0.40, w: 'square' },
                 { f: 1100, t: 0.13, d: 0.18, g: 0.50, w: 'square' }],
      rest:     [{ f: 660,  t: 0,    d: 0.30, g: 0.25, w: 'sine'   }],
      warn:     [{ f: 440,  t: 0,    d: 0.06, g: 0.20, w: 'sine'   }],
    }[type] || [];
    cues.forEach(({ f, t, d, g, w }) => {
      const o = ctx.createOscillator(), gn = ctx.createGain();
      o.connect(gn); gn.connect(ctx.destination);
      o.type = w; o.frequency.value = f;
      gn.gain.setValueAtTime(0, ctx.currentTime + t);
      gn.gain.linearRampToValueAtTime(g, ctx.currentTime + t + 0.01);
      gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + d);
      o.start(ctx.currentTime + t);
      o.stop(ctx.currentTime + t + d + 0.02);
    });
  } catch(e) {}
}

function buildSequence(exercises, levelIdx) {
  const seq = [];
  const midIdx = Math.floor(exercises.length / 2) - 1;
  exercises.forEach((ex, i) => {
    const mode = ex.mode || 'time';
    seq.push({
      ...ex,
      mode,
      target: ex.targets?.[['beginner','intermediate','expert'][levelIdx]] || ex.times?.[levelIdx] || 0,
      targetReps: (mode === 'reps' || mode === 'hybrid') ? (ex.targets?.[['beginner','intermediate','expert'][levelIdx]] || 10) : null,
      duration: mode === 'time' ? (ex.targets?.[['beginner','intermediate','expert'][levelIdx]] || ex.times[levelIdx]) : (ex.times?.[levelIdx] || 30),
      isRest: false
    });
    if (i < exercises.length - 1) {
      const isMid = i === midIdx;
      seq.push({
        id: `rest-${i}`, name: isMid ? 'Halfway · rest' : 'Rest',
        desc: isMid ? 'Great work! Almost done.' : 'Catch your breath.',
        duration: isMid ? 10 : 5, isRest: true, isMid,
      });
    }
  });
  return seq;
}

function calcStreak(sessions) {
  if (!sessions.length) return 0;
  const days = new Set(sessions.map(s => new Date(s.completedAt).toDateString()));
  let count = 0;
  const d = new Date();
  // check from today
  while (days.has(d.toDateString())) { count++; d.setDate(d.getDate() - 1); }
  // if today not done, check from yesterday
  if (count === 0) {
    d.setDate(d.getDate() - 1);
    while (days.has(d.toDateString())) { count++; d.setDate(d.getDate() - 1); }
  }
  return count;
}

function parseMin(v) {
  if (typeof v === 'number') return v;
  const m = String(v || '').match(/\d+/);
  return m ? parseInt(m[0], 10) : 0;
}
// Schaalt de minuten van een preset (intermediate als ijkpunt) naar het
// werkelijke level van het profiel. Som van times[idx] + 30s rust ertussen.
function presetMin(preset, level) {
  const idx = LEVEL_TIME_IDX[level || 'intermediate'] ?? 1;
  const work = (preset.exercises || []).reduce((s, id) => {
    const ex = EXERCISES_WITH_MODE.find(e => e.id === id);
    return s + (ex?.times?.[idx] || 0);
  }, 0);
  const rests = Math.max(0, (preset.exercises?.length || 0) - 1) * 30;
  return Math.max(1, Math.round((work + rests) / 60));
}
function routineTags(exerciseIds) {
  return getRoutineCategories(exerciseIds).map(c => CAT_TO_TAG[c]).filter(Boolean);

                <div className="qc-meta">

                  <div className="qc-stat">
                    <span className="qc-big">{min}</span>
                    <span className="qc-unit">MIN</span>
                    <span className="qc-sep">·</span>
                    <span className="qc-big">{p.exercises.length}</span>
                    <span className="qc-unit">EX</span>
                  </div>
                  <span className="qc-play" aria-hidden>{Icon.play(13)}</span>
                </div>

            );
          })}
        </div>
      </section>

      {/* My routines */}
      <section className="hm-section">
        <div className="hm-rowhead">
          <span className="hm-lbl">MY ROUTINES</span>
          <button className="hm-tinybtn" onClick={() => onNavigate('builder', {})}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
            NEW
          </button>
        </div>
        {quickRoutines.length > 0 ? (
          <div className="hm-rows">
            {quickRoutines.map(r => (
              <HmRoutineRow
                key={r.id}
                name={r.name}
                min={parseMin(r.durationLabel) || Math.max(1, Math.round((r.exercises?.length || 0) * 1.5))}
                ex={r.exercises?.length || 0}
                tags={routineTags(r.exercises || [])}
                onClick={() => onNavigate('timer', { routineId: r.id })}
              />
            ))}
          </div>
        ) : (
          <div className="hm-empty">
            <span>No custom routines yet</span>
            <button className="hm-tinybtn" onClick={() => onNavigate('builder', {})}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
              NEW
            </button>
          </div>
        )}
      </section>

      {/* By muscle group */}
      <section className="hm-section">
        <div className="hm-rowhead">
          <span className="hm-lbl">BY MUSCLE GROUP</span>
        </div>
        <div className="hm-chips">
          {CATS.map(cat => (
            <button
              key={cat}
              className={`hm-chip ${group === cat ? 'on' : ''}`}
              onClick={() => setGroup(cat)}
            >{cat.toUpperCase()}</button>
          ))}
        </div>
        <div className="hm-rows" style={{ marginTop: 10 }}>
          {filtered.map(w => (
            <HmRoutineRow
              key={w.id}
              name={w.name}
              min={parseMin(w.durationLabel)}
              ex={w.exercises.length}
              tags={routineTags(w.exercises)}
              onClick={() => onNavigate('timer', { routine: w, backTo: 'home' })}
            />
          ))}
        </div>
      </section>
    </>
  );
}

function PlanTab({ sessions, profile, onProfileUpdate, onNavigate }) {
  const defaultPlanId = selectDefaultPlan(profile);
  const selectedPlanId = profile?.selectedPlanId || defaultPlanId;
  const plan = BUILTIN_PLANS.find(p => p.id === selectedPlanId) || BUILTIN_PLANS[0];
  const hasPlanSession = sessions.some(s => s.planId);
  const needsPlanConfirmation = !profile?.planConfirmed && !hasPlanSession;
  const workDays = plan.days.filter(d => !d.restDay);
  const completedCount = workDays.filter(d => isPlanDayCompleted(plan, d.day, sessions)).length;
  const currentDay = workDays.find(d =>
    !isPlanDayCompleted(plan, d.day, sessions) && isPlanDayUnlocked(plan, d.day, sessions)
  ) || null;

  const startPlanDay = (day) => {
    const routine = {
      id: `plan-${plan.id}-day-${day.day}`,
      name: `DAY ${day.day} — ${plan.title}`,
      exercises: day.exercises,
      category: 'Core',
    };
    onNavigate('timer', { routine, planId: plan.id, planDay: day.day, backTo: 'home' });
  };

  const pct = workDays.length > 0 ? (completedCount / workDays.length) * 100 : 0;

  const IcoCheck = () => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6BE89B" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
  );
  const IcoLock = () => (
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  );
  const IcoMoon = () => (
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  );

  return (
    <>
      {/* Header */}
      <div style={{ padding: '0 20px 16px' }}>
        <div style={{ fontFamily: C.mono, fontSize: 26, fontWeight: 700, letterSpacing: '-0.03em', lineHeight: 1.1, color: C.text, marginBottom: 4 }}>
          {plan.title.toUpperCase()}
        </div>
        <div style={{ fontFamily: C.mono, fontSize: 13, letterSpacing: '0.10em', color: C.secondary }}>
          {plan.subtitle}
        </div>
      </div>

      {needsPlanConfirmation && (
        <div style={{ padding: '0 20px 14px' }}>
          <div style={{ border: `1px solid ${C.borderMd}`, borderRadius: 10, padding: 12, background: C.surface }}>
            <div style={{ fontFamily: C.mono, fontSize: 11, letterSpacing: '0.10em', color: C.muted, marginBottom: 10 }}>CHOOSE YOUR START PLAN</div>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {BUILTIN_PLANS.map(p => (
                <button key={p.id} onClick={() => onProfileUpdate({ selectedPlanId: p.id })} style={{ padding: '8px 10px', borderRadius: 8, border: `1px solid ${selectedPlanId === p.id ? p.color : C.borderMd}`, background: selectedPlanId === p.id ? 'rgba(232,254,60,0.08)' : 'transparent', color: selectedPlanId === p.id ? C.text : C.muted, fontFamily: C.mono, fontSize: 11 }}>{p.title}</button>
              ))}
            </div>
            <button onClick={() => onProfileUpdate({ selectedPlanId, planConfirmed: true })} style={{ marginTop: 10, width: '100%', padding: '10px 12px', borderRadius: 8, border: `1px solid ${C.accent}`, background: C.accent, color: C.accentFg, fontFamily: C.mono, fontSize: 12 }}>CONFIRM PLAN</button>
          </div>
        </div>
      )}
      <div style={{ padding: '0 20px 14px', fontFamily: C.mono, fontSize: 12, letterSpacing: '0.06em', color: C.muted }}>
        This plan was selected based on your goal and level.
      </div>

      {/* Progress bar */}
      <div style={{ padding: '0 20px 20px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
          <div style={{ fontFamily: C.mono, fontSize: 12, letterSpacing: '0.12em', color: C.muted }}>PROGRESS</div>
          <div style={{ fontFamily: C.mono, fontSize: 13, color: plan.color }}>{completedCount} / {workDays.length} DAYS</div>
        </div>
        <div style={{ height: 4, background: C.surface, borderRadius: 2, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${pct}%`, background: plan.color, borderRadius: 2 }} />
        </div>
      </div>

      {/* Days list */}
      <div style={{ padding: '0 20px', display: 'flex', flexDirection: 'column', gap: 8, paddingBottom: 24 }}>
        {plan.days.map(day => {
          const completed = !day.restDay && isPlanDayCompleted(plan, day.day, sessions);
          const isCurrent = !day.restDay && currentDay?.day === day.day;
          const unlocked = isPlanDayUnlocked(plan, day.day, sessions);

          return (
            <div key={day.day} style={{
              display: 'flex', alignItems: 'center', gap: 12,
              background: C.surface,
              border: `1px solid ${isCurrent ? C.accent : completed ? 'rgba(107,232,155,0.22)' : C.border}`,
              borderRadius: 10, padding: '13px 16px',
              opacity: !day.restDay && !unlocked && !completed ? 0.38 : 1,
            }}>
              {/* Status icon left */}
              <div style={{ width: 20, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                {completed ? <IcoCheck /> : day.restDay ? <IcoMoon /> : null}
              </div>

              {/* Text */}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{
                  fontFamily: C.mono, fontSize: 14, letterSpacing: '0.08em', fontWeight: 600,
                  color: completed ? C.muted : day.restDay ? C.muted : isCurrent ? C.accent : C.secondary,
                }}>
                  {day.restDay ? `DAY ${day.day} — REST` : `DAY ${day.day}`}
                </div>
                {!day.restDay && !completed && (
                  <div style={{ fontFamily: C.mono, fontSize: 12, color: C.muted, marginTop: 3, letterSpacing: '0.06em' }}>
                    {day.exercises.length} EX
                  </div>
                )}
              </div>

              {/* Action right */}
              {!day.restDay && !completed && unlocked && !needsPlanConfirmation && (
                <button onClick={() => startPlanDay(day)} style={{
                  fontFamily: C.mono, fontSize: 12, letterSpacing: '0.12em', fontWeight: 600,
                  background: isCurrent ? C.accent : 'transparent',
                  color: isCurrent ? C.accentFg : C.secondary,
                  border: `1px solid ${isCurrent ? C.accent : C.borderMd}`,
                  borderRadius: 6, padding: '8px 12px',
                  cursor: 'pointer', flexShrink: 0,
                }}>START</button>
              )}
              {!day.restDay && !completed && !unlocked && <IcoLock />}
            </div>
          );
        })}
      </div>
    </>
  );
}

function HomeScreen({ dbRef, onNavigate, analytics }) {
  const [activeTab, setActiveTab] = useState('home');
  const [sessions, setSessions] = useState([]);
  const [routines, setRoutines] = useState([]);
  const [profile, setProfile] = useState(null);
  const [ready, setReady] = useState(false);
  const [starterCTA, setStarterCTA] = useState(null);

  useEffect(() => {
    if (!dbRef.current) return;
    Promise.all([
      dbGetAll(dbRef.current, 'sessions'),
      dbGetAll(dbRef.current, 'routines'),
      getProfile(dbRef.current),
    ]).then(([s, r, prof]) => {
      setSessions(s.sort((a, b) => b.completedAt - a.completedAt));
      setRoutines(r);
      setProfile(prof);
      setStarterCTA({
        show: !s.length,
        profileId: prof?.starterPlanProfile || SAFE_STARTER_PROFILE,
        routineId: prof?.starterPlanSelection?.auto?.routineId || DEFAULT_ROUTINE.id,
        fallback: !!prof?.starterPlanSelection?.fallbackReason,
      });
      setReady(true);
    });
  }, []);

  const streak = useMemo(() => calcStreak(sessions), [sessions]);
  const today = new Date();
  const todayDone = sessions.some(s => new Date(s.completedAt).toDateString() === today.toDateString());
  const hours = today.getHours();
  const greeting = hours < 6 ? 'GOOD NIGHT' : hours < 12 ? 'GOOD MORNING' : hours < 18 ? 'GOOD AFTERNOON' : 'GOOD EVENING';

  const quickRoutines = routines.filter(r => r.quickStart !== false);
  const coachWorkouts = useMemo(() => profile ? buildCoachWorkouts(profile) : [], [profile]);
  const coachIntro    = useMemo(() => profile ? buildCoachIntro(profile)    : '', [profile]);

  const tabBtn = (tab) => ({
    flex: 1, padding: '10px 0',
    background: activeTab === tab ? C.accent : 'transparent',
    color: activeTab === tab ? C.accentFg : C.text,
    border: `1px solid ${activeTab === tab ? C.accent : '#555'}`,
    borderRadius: 8,
    fontFamily: C.mono, fontSize: 12, letterSpacing: '0.14em', fontWeight: 600,
    cursor: 'pointer',
  });

  if (!ready) return <Loader />;

  return (
    <div style={{ background: C.bg, color: C.text, minHeight: '100vh', paddingBottom: 'calc(var(--tab-h) + 24px)', fontFamily: C.font }}>
      {/* Tab bar */}
      <div style={{ padding: '52px 20px 20px', display: 'flex', gap: 8 }}>
        <button style={tabBtn('home')} onClick={() => setActiveTab('home')}>HOME</button>
        <button style={tabBtn('plan')} onClick={() => setActiveTab('plan')}>PLAN</button>
      </div>

      {activeTab === 'home' && (
        <HomeTab
          greeting={greeting}
          profile={profile}
          streak={streak}
          todayDone={todayDone}
          quickRoutines={quickRoutines}
          coachWorkouts={coachWorkouts}
          coachIntro={coachIntro}
          onNavigate={onNavigate}
          starterCTA={starterCTA}
          sessions={sessions}
        />
      )}
      {activeTab === 'plan' && (
        <PlanTab
          sessions={sessions}
          profile={profile}
          onProfileUpdate={async (patch) => {
            if (!dbRef.current) return;
            const previous = profile || {};
            await Promise.all(Object.entries(patch).map(([k,v]) => setProfileField(dbRef.current, k, v)));
            setProfile(prev => ({ ...(prev || {}), ...patch }));
            if (patch.planConfirmed && !previous.planConfirmed) {
              analytics.trackEvent('plan_assigned', { mode: 'manual', selectedPlanId: patch.selectedPlanId || previous.selectedPlanId || selectDefaultPlan(previous) }, { planId: patch.selectedPlanId || previous.selectedPlanId });
            }
          }}
          onNavigate={onNavigate}
        />
      )}
    </div>
  );
}

function RoutinesScreen({ dbRef, onNavigate, params }) {
  const [routines, setRoutines] = useState([]);
  const [ready, setReady] = useState(false);

  const load = () => {
    if (!dbRef.current) return;
    dbGetAll(dbRef.current, 'routines').then(r => {
      setRoutines(r.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0)));
      setReady(true);
    });
  };

  useEffect(load, []);

  const del = async (id, e) => {
    e.stopPropagation();
    if (!confirm('Delete routine?')) return;
    await dbOp(dbRef.current, 'routines', 'readwrite', s => s.delete(id));
    load();
  };

  const [filterCatR, setFilterCatR] = useState((params?.filterCat || 'ALL').toUpperCase());

  if (!ready) return <Loader />;

  const catFilters = ['ALL', ...CATS.map(c => c.toUpperCase())];
  const filteredRoutines = filterCatR === 'ALL'
    ? routines
    : routines.filter(r => {
        const cats = getRoutineCategories(r.exercises).map(c => c.toUpperCase());
        return cats.includes(filterCatR);
      });

  return (
    <div style={{ background: C.bg, color: C.text, minHeight: '100vh', paddingBottom: 'calc(var(--tab-h) + 24px)', fontFamily: C.font }}>

      {/* Header */}
      <header style={{ padding: '44px 20px 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
        <div>
          <div style={{ fontFamily: C.mono, fontSize: 12, letterSpacing: '0.16em', color: C.muted, marginBottom: 8 }}>MY</div>
          <h1 style={{ fontSize: 44, fontWeight: 700, letterSpacing: '-0.04em', lineHeight: 0.95 }}>ROUTINES</h1>
        </div>
        <button onClick={() => onNavigate('builder', {})} style={{
          width: 44, height: 44, borderRadius: '50%',
          background: C.accent, color: C.accentFg,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 22, fontWeight: 300, border: 'none', flexShrink: 0,
        }}>+</button>
      </header>

      {/* Filter pills */}
      <div style={{ display: 'flex', gap: 8, padding: '0 20px 20px', overflowX: 'auto', scrollbarWidth: 'none' }}>
        {catFilters.map(c => {
          const active = filterCatR === c;
          return (
            <button key={c} onClick={() => setFilterCatR(c)} style={{
              background: active ? C.accent : 'transparent',
              color: active ? C.accentFg : C.secondary,
              border: `1px solid ${active ? C.accent : C.borderMd}`,
              borderRadius: 999, padding: '7px 14px',
              fontFamily: C.mono, fontSize: 12, letterSpacing: '0.10em', fontWeight: 500,
              whiteSpace: 'nowrap', flexShrink: 0,
            }}>{c}</button>
          );
        })}
      </div>

      {/* Count */}
      <div style={{ padding: '0 20px 12px', fontFamily: C.mono, fontSize: 13, color: C.muted, letterSpacing: '0.08em' }}>
        {filteredRoutines.length} ROUTINE{filteredRoutines.length !== 1 ? 'S' : ''}
      </div>

      {/* List */}
      <div style={{ padding: '0 20px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {filteredRoutines.length === 0 && (
          <div style={{ textAlign: 'center', padding: '60px 0', color: C.muted, fontFamily: C.mono, fontSize: 12, letterSpacing: '0.1em' }}>
            No routines yet.
          </div>
        )}
        {filteredRoutines.map(r => (
          <div key={r.id} onClick={() => onNavigate('timer', { routineId: r.id })}
            style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, cursor: 'pointer', overflow: 'hidden' }}>
            <div style={{ padding: '14px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 18, fontWeight: 600, letterSpacing: '-0.01em', marginBottom: 8 }}>{r.name}</div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <CatTags exerciseIds={r.exercises} />
                  <span style={{ fontFamily: C.mono, fontSize: 13, color: C.secondary }}>{r.exercises.length} EX</span>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginLeft: 12, flexShrink: 0 }}>
                <button onClick={e => { e.stopPropagation(); onNavigate('builder', { routineId: r.id }); }}
                  style={{ background: 'none', border: 'none', color: C.muted, fontSize: 16, padding: '4px 6px' }}>✎</button>
                <button onClick={e => del(r.id, e)}
                  style={{ background: 'none', border: 'none', color: C.muted, fontSize: 16, padding: '4px 6px' }}>✕</button>
                <div style={{
                  color: C.accentFg, background: C.accent, borderRadius: 999,
                  width: 32, height: 32, display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}>
                  {Icon.play(12)}
                </div>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}
